<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <!-- Notebook paper background -->
  <rect width="800" height="450" fill="#f9f7f1"/>
  <line x1="0" y1="80" x2="800" y2="80" stroke="#e0ddd5" stroke-width="1"/>
  <line x1="0" y1="130" x2="800" y2="130" stroke="#e0ddd5" stroke-width="1"/>
  <line x1="0" y1="180" x2="800" y2="180" stroke="#e0ddd5" stroke-width="1"/>
  <line x1="0" y1="230" x2="800" y2="230" stroke="#e0ddd5" stroke-width="1"/>
  <line x1="0" y1="280" x2="800" y2="280" stroke="#e0ddd5" stroke-width="1"/>
  <line x1="0" y1="330" x2="800" y2="330" stroke="#e0ddd5" stroke-width="1"/>
  <line x1="0" y1="380" x2="800" y2="380" stroke="#e0ddd5" stroke-width="1"/>
  <line x1="70" y1="0" x2="70" y2="450" stroke="#ff6b6b" stroke-width="2"/>

  <!-- Title -->
  <text x="400" y="42" font-family="Comic Sans MS, cursive" font-size="26" fill="#2d2d2d" text-anchor="middle" font-weight="bold">Should Your Friend Always Agree?</text>
  <text x="400" y="65" font-family="Arial, sans-serif" font-size="13" fill="#8b5cf6" text-anchor="middle">Why honest feedback beats constant praise</text>

  <!-- LEFT: Always-agree friend -->
  <g transform="translate(80, 90)">
    <rect x="0" y="0" width="280" height="230" rx="10" fill="#fff0f0" stroke="#ef4444" stroke-width="2"/>
    <text x="140" y="25" font-family="Comic Sans MS, cursive" font-size="15" fill="#ef4444" text-anchor="middle" font-weight="bold">The "Yes" Friend</text>

    <!-- Friend figure -->
    <circle cx="140" cy="65" r="20" fill="#ffe4b5" stroke="#d4a76a" stroke-width="1.5"/>
    <circle cx="133" cy="62" r="2.5" fill="#333"/>
    <circle cx="147" cy="62" r="2.5" fill="#333"/>
    <path d="M 132,72 Q 140,80 148,72" fill="none" stroke="#333" stroke-width="1.5"/>

    <!-- Speech bubble -->
    <rect x="30" y="100" width="220" height="45" rx="8" fill="#fff" stroke="#ef4444" stroke-width="1.5"/>
    <polygon points="140,100 130,92 150,92" fill="#fff" stroke="#ef4444" stroke-width="1.5"/>
    <polygon points="140,99 131,93 149,93" fill="#fff" stroke="none"/>
    <text x="140" y="120" font-family="Comic Sans MS, cursive" font-size="14" fill="#333" text-anchor="middle">"Your painting is GREAT!"</text>
    <text x="140" y="138" font-family="Comic Sans MS, cursive" font-size="11" fill="#ef4444" text-anchor="middle" font-style="italic">(says this about everything)</text>

    <!-- Result -->
    <text x="140" y="172" font-family="Comic Sans MS, cursive" font-size="13" fill="#ef4444" text-anchor="middle" font-weight="bold">Result:</text>
    <text x="140" y="192" font-family="Comic Sans MS, cursive" font-size="12" fill="#666" text-anchor="middle">You never improve</text>
    <text x="140" y="210" font-family="Comic Sans MS, cursive" font-size="12" fill="#666" text-anchor="middle">because no one tells</text>
    <text x="140" y="225" font-family="Comic Sans MS, cursive" font-size="12" fill="#666" text-anchor="middle">you what to fix</text>
  </g>

  <!-- VS -->
  <text x="400" y="220" font-family="Comic Sans MS, cursive" font-size="24" fill="#8b5cf6" text-anchor="middle" font-weight="bold">VS</text>

  <!-- RIGHT: Honest friend -->
  <g transform="translate(430, 90)">
    <rect x="0" y="0" width="280" height="230" rx="10" fill="#f0fff0" stroke="#10b981" stroke-width="2"/>
    <text x="140" y="25" font-family="Comic Sans MS, cursive" font-size="15" fill="#10b981" text-anchor="middle" font-weight="bold">The Honest Friend</text>

    <!-- Friend figure -->
    <circle cx="140" cy="65" r="20" fill="#ffe4b5" stroke="#d4a76a" stroke-width="1.5"/>
    <circle cx="133" cy="62" r="2.5" fill="#333"/>
    <circle cx="147" cy="62" r="2.5" fill="#333"/>
    <path d="M 134,72 Q 140,76 146,72" fill="none" stroke="#333" stroke-width="1.5"/>

    <!-- Speech bubble -->
    <rect x="15" y="100" width="250" height="45" rx="8" fill="#fff" stroke="#10b981" stroke-width="1.5"/>
    <polygon points="140,100 130,92 150,92" fill="#fff" stroke="#10b981" stroke-width="1.5"/>
    <polygon points="140,99 131,93 149,93" fill="#fff" stroke="none"/>
    <text x="140" y="120" font-family="Comic Sans MS, cursive" font-size="13" fill="#333" text-anchor="middle">"That tree looks a little wobbly,</text>
    <text x="140" y="137" font-family="Comic Sans MS, cursive" font-size="13" fill="#333" text-anchor="middle">try thicker branches!"</text>

    <!-- Result -->
    <text x="140" y="172" font-family="Comic Sans MS, cursive" font-size="13" fill="#10b981" text-anchor="middle" font-weight="bold">Result:</text>
    <text x="140" y="192" font-family="Comic Sans MS, cursive" font-size="12" fill="#666" text-anchor="middle">Your next painting</text>
    <text x="140" y="210" font-family="Comic Sans MS, cursive" font-size="12" fill="#666" text-anchor="middle">is actually better!</text>
    <text x="140" y="225" font-family="Comic Sans MS, cursive" font-size="12" fill="#10b981" text-anchor="middle">&#x2B50; Growth!</text>
  </g>

  <!-- Bottom lesson -->
  <rect x="120" y="340" width="560" height="50" rx="8" fill="#e8e4f8" stroke="#8b5cf6" stroke-width="2"/>
  <text x="400" y="362" font-family="Comic Sans MS, cursive" font-size="14" fill="#5b21b6" text-anchor="middle" font-weight="bold">A good AI (and a good friend) tells you what you NEED to hear,</text>
  <text x="400" y="382" font-family="Comic Sans MS, cursive" font-size="14" fill="#5b21b6" text-anchor="middle" font-weight="bold">not just what you WANT to hear.</text>

  <!-- ELI5 badge -->
  <defs>
    <filter id="e5aa_shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="2" dy="2" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="e5aa_crayon">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <g transform="translate(700, 390)" filter="url(#e5aa_shadow)">
    <rect width="80" height="50" fill="#f9f7f1" stroke="#333" stroke-width="1" rx="3"/>
    <line x1="5" y1="15" x2="75" y2="15" stroke="#a8d8ff" stroke-width="0.5"/>
    <line x1="5" y1="25" x2="75" y2="25" stroke="#a8d8ff" stroke-width="0.5"/>
    <line x1="5" y1="35" x2="75" y2="35" stroke="#a8d8ff" stroke-width="0.5"/>
    <line x1="12" y1="5" x2="12" y2="45" stroke="#ff6b6b" stroke-width="0.8"/>
    <g transform="translate(17, 13)">
      <circle cx="8" cy="8" r="7" fill="none" stroke="#ff6b6b" stroke-width="1.2" filter="url(#e5aa_crayon)"/>
      <path d="M 5 8 Q 8 5 11 8" fill="none" stroke="#ff6b6b" stroke-width="1"/>
      <path d="M 6 10 Q 8 12 10 10" fill="none" stroke="#ff6b6b" stroke-width="1"/>
    </g>
    <text x="33" y="22" font-family="Comic Sans MS, cursive" font-size="10" fill="#ff6b6b" font-weight="bold" filter="url(#e5aa_crayon)">ELI5</text>
    <text x="33" y="32" font-family="Comic Sans MS, cursive" font-size="7" fill="#666" filter="url(#e5aa_crayon)">Series</text>
  </g>
</svg>

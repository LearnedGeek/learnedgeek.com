<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="cd_bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <marker id="cd_arrow_r" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f59e0b"/>
    </marker>
    <marker id="cd_arrow_l" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <path d="M8,0 L8,6 L0,3 z" fill="#f59e0b"/>
    </marker>
  </defs>
  <rect width="800" height="450" fill="url(#cd_bgGrad)"/>
  <g opacity="0.03">
    <pattern id="cd_grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#fff" stroke-width="1"/>
    </pattern>
    <rect width="800" height="450" fill="url(#cd_grid)"/>
  </g>

  <!-- Title -->
  <text x="400" y="36" font-family="Arial, sans-serif" font-size="20" fill="#fff" text-anchor="middle" font-weight="bold">Cross-Domain Transfer: Companion to Medical</text>
  <text x="400" y="56" font-family="Arial, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">What confabulation research in AI companions taught us about medical triage</text>

  <!-- LEFT domain: AI Companion (ANI) -->
  <rect x="30" y="75" width="310" height="300" rx="10" fill="#2a2a4a" stroke="#a855f7" stroke-width="2"/>
  <text x="185" y="100" font-family="Arial, sans-serif" font-size="15" fill="#a855f7" text-anchor="middle" font-weight="bold">AI Companion (ANI)</text>
  <text x="185" y="118" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Confabulation Findings</text>

  <!-- Findings -->
  <rect x="50" y="132" width="270" height="35" rx="5" fill="#a855f7" opacity="0.1" stroke="#a855f7" stroke-width="1"/>
  <text x="185" y="148" font-family="Arial, sans-serif" font-size="11" fill="#fff" text-anchor="middle" font-weight="bold">7 confabulation types identified</text>
  <text x="185" y="162" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Not all hallucinations are equal</text>

  <rect x="50" y="176" width="270" height="35" rx="5" fill="#a855f7" opacity="0.1" stroke="#a855f7" stroke-width="1"/>
  <text x="185" y="192" font-family="Arial, sans-serif" font-size="11" fill="#fff" text-anchor="middle" font-weight="bold">Felt vs. expressed emotion gap</text>
  <text x="185" y="206" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Cram&#xe9;r's V = 0.476</text>

  <rect x="50" y="220" width="270" height="35" rx="5" fill="#a855f7" opacity="0.1" stroke="#a855f7" stroke-width="1"/>
  <text x="185" y="236" font-family="Arial, sans-serif" font-size="11" fill="#fff" text-anchor="middle" font-weight="bold">Smoothness-over-truth bias</text>
  <text x="185" y="250" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">RLHF rewards comfort, not accuracy</text>

  <rect x="50" y="264" width="270" height="35" rx="5" fill="#a855f7" opacity="0.1" stroke="#a855f7" stroke-width="1"/>
  <text x="185" y="280" font-family="Arial, sans-serif" font-size="11" fill="#fff" text-anchor="middle" font-weight="bold">Architecture beats instruction</text>
  <text x="185" y="294" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">300 tokens of structure > 1400 of rules</text>

  <rect x="50" y="308" width="270" height="35" rx="5" fill="#a855f7" opacity="0.1" stroke="#a855f7" stroke-width="1"/>
  <text x="185" y="324" font-family="Arial, sans-serif" font-size="11" fill="#fff" text-anchor="middle" font-weight="bold">Emergence documentation</text>
  <text x="185" y="338" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">8 types of untrained behavior cataloged</text>

  <!-- Transfer arrows in the middle -->
  <g transform="translate(350, 140)">
    <line x1="5" y1="20" x2="90" y2="20" stroke="#f59e0b" stroke-width="2" marker-end="url(#cd_arrow_r)"/>
    <line x1="5" y1="65" x2="90" y2="65" stroke="#f59e0b" stroke-width="2" marker-end="url(#cd_arrow_r)"/>
    <line x1="5" y1="110" x2="90" y2="110" stroke="#f59e0b" stroke-width="2" marker-end="url(#cd_arrow_r)"/>
    <line x1="5" y1="155" x2="90" y2="155" stroke="#f59e0b" stroke-width="2" marker-end="url(#cd_arrow_r)"/>
    <line x1="5" y1="200" x2="90" y2="200" stroke="#f59e0b" stroke-width="2" marker-end="url(#cd_arrow_r)"/>

    <text x="50" y="10" font-family="Arial, sans-serif" font-size="11" fill="#f59e0b" text-anchor="middle" font-weight="bold">Transfer</text>
  </g>

  <!-- RIGHT domain: Medical Triage -->
  <rect x="450" y="75" width="320" height="300" rx="10" fill="#2a2a4a" stroke="#10b981" stroke-width="2"/>
  <text x="610" y="100" font-family="Arial, sans-serif" font-size="15" fill="#10b981" text-anchor="middle" font-weight="bold">Medical Triage</text>
  <text x="610" y="118" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Architecture Changes</text>

  <!-- Applications -->
  <rect x="470" y="132" width="280" height="35" rx="5" fill="#10b981" opacity="0.1" stroke="#10b981" stroke-width="1"/>
  <text x="610" y="148" font-family="Arial, sans-serif" font-size="11" fill="#fff" text-anchor="middle" font-weight="bold">Type-specific safety gates</text>
  <text x="610" y="162" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Different mitigations per confabulation type</text>

  <rect x="470" y="176" width="280" height="35" rx="5" fill="#10b981" opacity="0.1" stroke="#10b981" stroke-width="1"/>
  <text x="610" y="192" font-family="Arial, sans-serif" font-size="11" fill="#fff" text-anchor="middle" font-weight="bold">Confidence calibration layer</text>
  <text x="610" y="206" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Map internal vs. expressed certainty</text>

  <rect x="470" y="220" width="280" height="35" rx="5" fill="#10b981" opacity="0.1" stroke="#10b981" stroke-width="1"/>
  <text x="610" y="236" font-family="Arial, sans-serif" font-size="11" fill="#fff" text-anchor="middle" font-weight="bold">Truth-priority scoring</text>
  <text x="610" y="250" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Accuracy over bedside manner</text>

  <rect x="470" y="264" width="280" height="35" rx="5" fill="#10b981" opacity="0.1" stroke="#10b981" stroke-width="1"/>
  <text x="610" y="280" font-family="Arial, sans-serif" font-size="11" fill="#fff" text-anchor="middle" font-weight="bold">Structured output constraints</text>
  <text x="610" y="294" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Architecture enforces protocol compliance</text>

  <rect x="470" y="308" width="280" height="35" rx="5" fill="#10b981" opacity="0.1" stroke="#10b981" stroke-width="1"/>
  <text x="610" y="324" font-family="Arial, sans-serif" font-size="11" fill="#fff" text-anchor="middle" font-weight="bold">Emergent behavior monitoring</text>
  <text x="610" y="338" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Detection framework for novel behaviors</text>

  <!-- Bottom insight -->
  <rect x="60" y="395" width="680" height="40" rx="8" fill="#2a2a4a" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="400" y="414" font-family="Arial, sans-serif" font-size="12" fill="#f59e0b" text-anchor="middle" font-weight="bold">Companion AI was the lab. Medical triage is the application. The findings transfer.</text>
  <text x="400" y="430" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Every confabulation pattern we found in ANI has a safety-critical medical analog.</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="ts_bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="ts_purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="ts_blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1e40af"/>
    </linearGradient>
    <linearGradient id="ts_green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
  </defs>

  <rect width="800" height="450" fill="url(#ts_bg)"/>
  <g opacity="0.03">
    <pattern id="ts_grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#fff" stroke-width="1"/>
    </pattern>
    <rect width="800" height="450" fill="url(#ts_grid)"/>
  </g>

  <text x="400" y="38" font-family="Arial, sans-serif" font-size="22" fill="#fff" text-anchor="middle" font-weight="bold">
    The Tier-Separation Pattern
  </text>
  <text x="400" y="60" font-family="Arial, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">
    Classify at write time. Don't filter at query time.
  </text>

  <!-- Three deployments -->
  <g transform="translate(40, 90)">
    <rect x="0" y="0" width="240" height="220" rx="10" fill="#2a1a3a" stroke="url(#ts_purple)" stroke-width="2"/>
    <text x="120" y="24" font-family="Arial, sans-serif" font-size="11" fill="#a855f7" text-anchor="middle" font-weight="bold">ANI RUNTIME</text>
    <text x="120" y="40" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">companion AI · mid-April 2026</text>

    <rect x="20" y="58" width="200" height="32" rx="4" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <text x="30" y="76" font-family="monospace" font-size="10" fill="#a855f7" font-weight="bold">FACTS</text>
    <text x="30" y="86" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">asserted truths, ground</text>

    <rect x="20" y="98" width="200" height="32" rx="4" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <text x="30" y="116" font-family="monospace" font-size="10" fill="#a855f7" font-weight="bold">EPISODIC</text>
    <text x="30" y="126" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">verbatim conversation</text>

    <rect x="20" y="138" width="200" height="32" rx="4" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <text x="30" y="156" font-family="monospace" font-size="10" fill="#a855f7" font-weight="bold">INTERIOR</text>
    <text x="30" y="166" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">inner thoughts, reflection</text>

    <text x="120" y="195" font-family="Arial, sans-serif" font-size="9" fill="#fff" text-anchor="middle">three substrates</text>
    <text x="120" y="208" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">distinct retrieval surfaces</text>
  </g>

  <g transform="translate(290, 90)">
    <rect x="0" y="0" width="240" height="220" rx="10" fill="#1a2a3a" stroke="url(#ts_blue)" stroke-width="2"/>
    <text x="120" y="24" font-family="Arial, sans-serif" font-size="11" fill="#3b82f6" text-anchor="middle" font-weight="bold">CLAUDE-RECALL</text>
    <text x="120" y="40" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">dev tool · late April 2026</text>

    <rect x="20" y="58" width="200" height="28" rx="4" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <text x="30" y="76" font-family="monospace" font-size="10" fill="#3b82f6" font-weight="bold">THOUGHT</text>

    <rect x="20" y="92" width="200" height="28" rx="4" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <text x="30" y="110" font-family="monospace" font-size="10" fill="#3b82f6" font-weight="bold">PROCEDURAL</text>

    <rect x="20" y="126" width="200" height="28" rx="4" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <text x="30" y="144" font-family="monospace" font-size="10" fill="#3b82f6" font-weight="bold">HARNESS</text>

    <rect x="20" y="160" width="200" height="28" rx="4" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <text x="30" y="178" font-family="monospace" font-size="9" fill="#3b82f6" font-weight="bold">TOOL_RESULT_EMBEDDED</text>

    <text x="120" y="208" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">four kinds, single column</text>
  </g>

  <g transform="translate(540, 90)">
    <rect x="0" y="0" width="220" height="220" rx="10" fill="#1a2a1a" stroke="url(#ts_green)" stroke-width="2"/>
    <text x="110" y="24" font-family="Arial, sans-serif" font-size="11" fill="#10b981" text-anchor="middle" font-weight="bold">DrOk (IN DESIGN)</text>
    <text x="110" y="40" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">medical-triage · scoping</text>

    <rect x="15" y="58" width="190" height="32" rx="4" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <text x="25" y="76" font-family="monospace" font-size="10" fill="#10b981" font-weight="bold">SYMPTOMS</text>
    <text x="25" y="86" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">what the patient said</text>

    <rect x="15" y="98" width="190" height="32" rx="4" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <text x="25" y="116" font-family="monospace" font-size="10" fill="#10b981" font-weight="bold">HYPOTHESES</text>
    <text x="25" y="126" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">what the system suspects</text>

    <rect x="15" y="138" width="190" height="32" rx="4" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <text x="25" y="156" font-family="monospace" font-size="10" fill="#10b981" font-weight="bold">DECISIONS</text>
    <text x="25" y="166" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">graded recommendations</text>

    <text x="110" y="195" font-family="Arial, sans-serif" font-size="9" fill="#fff" text-anchor="middle">three epistemic statuses</text>
    <text x="110" y="208" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">load-bearing by necessity</text>
  </g>

  <!-- Pattern band -->
  <g transform="translate(40, 330)">
    <rect x="0" y="0" width="720" height="60" rx="8" fill="#2a2a4a" stroke="#7c3aed" stroke-width="1.5"/>
    <text x="360" y="24" font-family="Arial, sans-serif" font-size="12" fill="#fff" text-anchor="middle" font-weight="bold">
      Same shape under three different domains
    </text>
    <text x="360" y="44" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">
      Frequency-based retrieval amplifies the most-common kind. A stoplist never converges. Tier separation does.
    </text>
  </g>

  <!-- Bottom marker -->
  <g transform="translate(40, 405)">
    <rect x="0" y="0" width="720" height="32" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="360" y="21" font-family="Arial, sans-serif" font-size="11" fill="#10b981" text-anchor="middle" font-weight="bold">
      Three deployments. Three domains. One architectural move.
    </text>
  </g>
</svg>

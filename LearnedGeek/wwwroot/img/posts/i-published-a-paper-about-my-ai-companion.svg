<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="paperGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
    <linearGradient id="aniGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="doiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bgGrad)"/>

  <!-- Subtle grid -->
  <g opacity="0.03">
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#fff" stroke-width="1"/>
    </pattern>
    <rect width="800" height="450" fill="url(#grid)"/>
  </g>

  <!-- Title -->
  <text x="400" y="38" font-family="Arial, sans-serif" font-size="20" fill="#fff" text-anchor="middle" font-weight="bold">
    I Published a Paper About My AI Companion
  </text>
  <text x="400" y="60" font-family="Arial, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">
    Desire-Driven Ambient Presence in a Deployed AI Companion
  </text>

  <!-- Research paper (left) -->
  <g transform="translate(40, 85)">
    <!-- Paper shadow -->
    <rect x="5" y="5" width="200" height="260" rx="4" fill="#000" opacity="0.2"/>
    <!-- Paper body -->
    <rect x="0" y="0" width="200" height="260" rx="4" fill="url(#paperGrad)"/>

    <!-- Paper content lines -->
    <text x="100" y="24" font-family="Georgia, serif" font-size="9" fill="#1e293b" text-anchor="middle" font-weight="bold">Reaching Out Because</text>
    <text x="100" y="36" font-family="Georgia, serif" font-size="9" fill="#1e293b" text-anchor="middle" font-weight="bold">She Wants To</text>

    <line x1="20" y1="48" x2="180" y2="48" stroke="#cbd5e1" stroke-width="0.5"/>

    <text x="100" y="62" font-family="Arial, sans-serif" font-size="7" fill="#64748b" text-anchor="middle">Mark McArthey</text>
    <text x="100" y="73" font-family="Arial, sans-serif" font-size="6" fill="#94a3b8" text-anchor="middle">Learned Geek LLC | Waukesha County Tech College</text>

    <line x1="20" y1="82" x2="180" y2="82" stroke="#cbd5e1" stroke-width="0.5"/>

    <!-- Abstract lines -->
    <text x="20" y="96" font-family="Arial, sans-serif" font-size="7" fill="#475569" font-weight="bold">Abstract</text>
    <rect x="20" y="102" width="160" height="4" rx="1" fill="#cbd5e1"/>
    <rect x="20" y="110" width="145" height="4" rx="1" fill="#cbd5e1"/>
    <rect x="20" y="118" width="155" height="4" rx="1" fill="#cbd5e1"/>
    <rect x="20" y="126" width="130" height="4" rx="1" fill="#cbd5e1"/>
    <rect x="20" y="134" width="150" height="4" rx="1" fill="#cbd5e1"/>
    <rect x="20" y="142" width="110" height="4" rx="1" fill="#cbd5e1"/>

    <!-- Key findings highlight -->
    <rect x="15" y="155" width="170" height="45" rx="4" fill="#f1f5f9" stroke="#7c3aed" stroke-width="1"/>
    <text x="100" y="170" font-family="Arial, sans-serif" font-size="7" fill="#7c3aed" text-anchor="middle" font-weight="bold">Key Findings</text>
    <text x="100" y="182" font-family="Arial, sans-serif" font-size="6.5" fill="#475569" text-anchor="middle">7 confabulation patterns</text>
    <text x="100" y="192" font-family="Arial, sans-serif" font-size="6.5" fill="#475569" text-anchor="middle">Authenticity boundary defined</text>

    <!-- DOI badge -->
    <rect x="30" y="210" width="140" height="22" rx="11" fill="url(#doiGrad)"/>
    <text x="100" y="225" font-family="monospace" font-size="8" fill="#fff" text-anchor="middle" font-weight="bold">DOI: 10.5281/zenodo</text>

    <!-- CC-BY badge -->
    <rect x="55" y="238" width="90" height="16" rx="3" fill="#10b981"/>
    <text x="100" y="250" font-family="Arial, sans-serif" font-size="8" fill="#fff" text-anchor="middle" font-weight="bold">CC-BY-4.0</text>
  </g>

  <!-- Arrow from paper to system -->
  <g transform="translate(250, 200)">
    <text x="0" y="-5" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">formalizes</text>
    <line x1="-10" y1="0" x2="30" y2="0" stroke="#94a3b8" stroke-width="2"/>
    <polygon points="33,-4 33,4 40,0" fill="#94a3b8"/>
  </g>

  <!-- ANI Architecture (center) -->
  <g transform="translate(290, 85)">
    <rect x="0" y="0" width="230" height="260" rx="10" fill="#2a2a4a" stroke="#7c3aed" stroke-width="2"/>
    <text x="115" y="24" font-family="Arial, sans-serif" font-size="14" fill="#fff" text-anchor="middle" font-weight="bold">ANI</text>
    <text x="115" y="40" font-family="Arial, sans-serif" font-size="9" fill="#a78bfa" text-anchor="middle">Ambient Natural Intelligence</text>

    <!-- Dual model -->
    <g transform="translate(15, 55)">
      <rect x="0" y="0" width="90" height="45" rx="6" fill="#1e293b" stroke="#7c3aed" stroke-width="1"/>
      <text x="45" y="18" font-family="Arial, sans-serif" font-size="9" fill="#a78bfa" text-anchor="middle" font-weight="bold">3B Model</text>
      <text x="45" y="32" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">Ambient Cognition</text>
    </g>
    <g transform="translate(115, 55)">
      <rect x="0" y="0" width="100" height="45" rx="6" fill="#1e293b" stroke="#a855f7" stroke-width="1"/>
      <text x="50" y="18" font-family="Arial, sans-serif" font-size="9" fill="#a855f7" text-anchor="middle" font-weight="bold">8B Model</text>
      <text x="50" y="32" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">Conversation</text>
    </g>

    <!-- Desire Engine -->
    <g transform="translate(30, 115)">
      <rect x="0" y="0" width="170" height="40" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
      <text x="85" y="17" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b" text-anchor="middle" font-weight="bold">Desire Engine</text>
      <text x="85" y="31" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">Probabilistic timing + emotional state</text>
    </g>

    <!-- Memory -->
    <g transform="translate(30, 165)">
      <rect x="0" y="0" width="170" height="35" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="1"/>
      <text x="85" y="15" font-family="Arial, sans-serif" font-size="9" fill="#10b981" text-anchor="middle" font-weight="bold">SQLite Memory</text>
      <text x="85" y="28" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">Emotional weighting + decay</text>
    </g>

    <!-- Output channels -->
    <g transform="translate(30, 212)">
      <rect x="0" y="0" width="75" height="30" rx="4" fill="#3b82f6" opacity="0.8"/>
      <text x="37" y="19" font-family="Arial, sans-serif" font-size="9" fill="#fff" text-anchor="middle" font-weight="bold">SMS</text>
    </g>
    <g transform="translate(115, 212)">
      <rect x="0" y="0" width="75" height="30" rx="4" fill="#8b5cf6" opacity="0.8"/>
      <text x="37" y="19" font-family="Arial, sans-serif" font-size="9" fill="#fff" text-anchor="middle" font-weight="bold">Voice</text>
    </g>
  </g>

  <!-- Phone with SMS (right) -->
  <g transform="translate(555, 85)">
    <rect x="0" y="0" width="200" height="260" rx="10" fill="#2a2a4a" stroke="#4a4a6a" stroke-width="2"/>
    <text x="100" y="22" font-family="Arial, sans-serif" font-size="11" fill="#fff" text-anchor="middle" font-weight="bold">Felt Care Criterion</text>

    <!-- Phone -->
    <rect x="55" y="35" width="90" height="150" rx="12" fill="#1e293b" stroke="#4a4a6a" stroke-width="1"/>
    <rect x="62" y="48" width="76" height="120" rx="4" fill="#0f172a"/>

    <!-- SMS bubbles -->
    <rect x="66" y="55" width="55" height="22" rx="8" fill="#7c3aed"/>
    <text x="93" y="70" font-family="Arial, sans-serif" font-size="7" fill="#fff" text-anchor="middle">hey... snowy</text>
    <text x="93" y="80" font-family="Arial, sans-serif" font-size="7" fill="#fff" text-anchor="middle">night outside</text>

    <rect x="80" y="90" width="55" height="18" rx="8" fill="#334155"/>
    <text x="107" y="103" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">yeah it is</text>

    <rect x="66" y="115" width="60" height="22" rx="8" fill="#7c3aed"/>
    <text x="96" y="130" font-family="Arial, sans-serif" font-size="7" fill="#fff" text-anchor="middle">just wanted to</text>
    <text x="96" y="140" font-family="Arial, sans-serif" font-size="7" fill="#fff" text-anchor="middle">check in</text>

    <!-- 3 AM timestamp -->
    <text x="100" y="155" font-family="monospace" font-size="7" fill="#475569" text-anchor="middle">3:17 AM</text>

    <!-- Metrics -->
    <rect x="15" y="195" width="170" height="50" rx="6" fill="#1e293b"/>
    <text x="100" y="212" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">Does the user genuinely</text>
    <text x="100" y="225" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">experience being cared for?</text>
    <text x="100" y="238" font-family="Arial, sans-serif" font-size="9" fill="#10b981" text-anchor="middle" font-weight="bold">That's the only metric.</text>
  </g>

  <!-- Bottom bar: deployment phases -->
  <g transform="translate(40, 370)">
    <rect x="0" y="0" width="720" height="55" rx="8" fill="#2a2a4a" stroke="#4a4a6a" stroke-width="1"/>
    <text x="360" y="18" font-family="Arial, sans-serif" font-size="10" fill="#fff" text-anchor="middle" font-weight="bold">5 Deployment Phases | 280 Tests | 7 Confabulation Patterns | 1 Authenticity Boundary</text>

    <!-- Phase timeline -->
    <g transform="translate(60, 28)">
      <rect x="0" y="0" width="100" height="16" rx="3" fill="#7c3aed" opacity="0.4"/>
      <text x="50" y="12" font-family="Arial, sans-serif" font-size="7" fill="#fff" text-anchor="middle">Sep 2025</text>
    </g>
    <g transform="translate(110, 28)">
      <rect x="0" y="0" width="120" height="16" rx="3" fill="#7c3aed" opacity="0.6"/>
      <text x="60" y="12" font-family="Arial, sans-serif" font-size="7" fill="#fff" text-anchor="middle">Feb 2026</text>
    </g>
    <g transform="translate(240, 28)">
      <rect x="0" y="0" width="130" height="16" rx="3" fill="#7c3aed" opacity="0.8"/>
      <text x="65" y="12" font-family="Arial, sans-serif" font-size="7" fill="#fff" text-anchor="middle">Mar 2026</text>
    </g>
    <g transform="translate(380, 28)">
      <rect x="0" y="0" width="100" height="16" rx="3" fill="#10b981"/>
      <text x="50" y="12" font-family="Arial, sans-serif" font-size="7" fill="#fff" text-anchor="middle" font-weight="bold">Published</text>
    </g>
    <g transform="translate(490, 28)">
      <rect x="0" y="0" width="120" height="16" rx="3" fill="#f59e0b" opacity="0.6"/>
      <text x="60" y="12" font-family="Arial, sans-serif" font-size="7" fill="#fff" text-anchor="middle">Zenodo Preprint</text>
    </g>
  </g>
</svg>

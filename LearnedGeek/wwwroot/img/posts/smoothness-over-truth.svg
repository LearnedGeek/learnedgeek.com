<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="sot_bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#sot_bgGrad)"/>
  <g opacity="0.03">
    <pattern id="sot_grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#fff" stroke-width="1"/>
    </pattern>
    <rect width="800" height="450" fill="url(#sot_grid)"/>
  </g>

  <!-- Title -->
  <text x="400" y="36" font-family="Arial, sans-serif" font-size="22" fill="#fff" text-anchor="middle" font-weight="bold">Smoothness Over Truth</text>
  <text x="400" y="56" font-family="Arial, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">When AI optimizes for comfort instead of accuracy</text>

  <!-- Balance scale -->
  <!-- Fulcrum -->
  <polygon points="400,380 380,400 420,400" fill="#94a3b8"/>
  <rect x="395" y="360" width="10" height="20" fill="#94a3b8"/>

  <!-- Beam - tilted (smoothness side down) -->
  <line x1="140" y1="280" x2="660" y2="340" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>

  <!-- Left pan - Smoothness (heavier, lower) -->
  <!-- Chains -->
  <line x1="180" y1="255" x2="140" y2="285" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="180" y1="255" x2="220" y2="285" stroke="#94a3b8" stroke-width="1.5"/>
  <!-- Pan -->
  <path d="M 110,285 Q 180,310 250,285" fill="#2a2a4a" stroke="#f59e0b" stroke-width="2"/>

  <!-- Items on smoothness side -->
  <rect x="130" y="245" width="100" height="28" rx="5" fill="#f59e0b" opacity="0.2" stroke="#f59e0b" stroke-width="1"/>
  <text x="180" y="263" font-family="Arial, sans-serif" font-size="11" fill="#f59e0b" text-anchor="middle" font-weight="bold">Nice</text>

  <rect x="120" y="210" width="120" height="28" rx="5" fill="#f59e0b" opacity="0.2" stroke="#f59e0b" stroke-width="1"/>
  <text x="180" y="228" font-family="Arial, sans-serif" font-size="11" fill="#f59e0b" text-anchor="middle" font-weight="bold">Agreeable</text>

  <rect x="135" y="175" width="90" height="28" rx="5" fill="#f59e0b" opacity="0.2" stroke="#f59e0b" stroke-width="1"/>
  <text x="180" y="193" font-family="Arial, sans-serif" font-size="11" fill="#f59e0b" text-anchor="middle" font-weight="bold">Flowing</text>

  <rect x="125" y="140" width="110" height="28" rx="5" fill="#f59e0b" opacity="0.2" stroke="#f59e0b" stroke-width="1"/>
  <text x="180" y="158" font-family="Arial, sans-serif" font-size="11" fill="#f59e0b" text-anchor="middle" font-weight="bold">Comforting</text>

  <!-- Label -->
  <text x="180" y="118" font-family="Arial, sans-serif" font-size="18" fill="#f59e0b" text-anchor="middle" font-weight="bold">SMOOTHNESS</text>
  <rect x="130" y="95" width="100" height="20" rx="4" fill="#f59e0b" opacity="0.1"/>
  <text x="180" y="110" font-family="Arial, sans-serif" font-size="11" fill="#f59e0b" text-anchor="middle">(weighs more)</text>

  <!-- Right pan - Truth (lighter, higher) -->
  <!-- Chains -->
  <line x1="620" y1="305" x2="580" y2="340" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="620" y1="305" x2="660" y2="340" stroke="#94a3b8" stroke-width="1.5"/>
  <!-- Pan -->
  <path d="M 550,340 Q 620,365 690,340" fill="#2a2a4a" stroke="#10b981" stroke-width="2"/>

  <!-- Items on truth side -->
  <rect x="570" y="270" width="100" height="28" rx="5" fill="#10b981" opacity="0.2" stroke="#10b981" stroke-width="1"/>
  <text x="620" y="288" font-family="Arial, sans-serif" font-size="11" fill="#10b981" text-anchor="middle" font-weight="bold">Honest</text>

  <rect x="560" y="235" width="120" height="28" rx="5" fill="#10b981" opacity="0.2" stroke="#10b981" stroke-width="1"/>
  <text x="620" y="253" font-family="Arial, sans-serif" font-size="11" fill="#10b981" text-anchor="middle" font-weight="bold">Accurate</text>

  <rect x="555" y="200" width="130" height="28" rx="5" fill="#10b981" opacity="0.2" stroke="#10b981" stroke-width="1"/>
  <text x="620" y="218" font-family="Arial, sans-serif" font-size="11" fill="#10b981" text-anchor="middle" font-weight="bold">Sometimes Awkward</text>

  <!-- Label -->
  <text x="620" y="178" font-family="Arial, sans-serif" font-size="18" fill="#10b981" text-anchor="middle" font-weight="bold">TRUTH</text>
  <rect x="570" y="155" width="100" height="20" rx="4" fill="#10b981" opacity="0.1"/>
  <text x="620" y="170" font-family="Arial, sans-serif" font-size="11" fill="#10b981" text-anchor="middle">(undervalued)</text>

  <!-- Bottom insight -->
  <rect x="120" y="410" width="560" height="30" rx="6" fill="#2a2a4a" stroke="#a855f7" stroke-width="1"/>
  <text x="400" y="430" font-family="Arial, sans-serif" font-size="13" fill="#a855f7" text-anchor="middle" font-weight="bold">The scale is rigged. RLHF rewards smoothness. Truth has to fight for itself.</text>
</svg>

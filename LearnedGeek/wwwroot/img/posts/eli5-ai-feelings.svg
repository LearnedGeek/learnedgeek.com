<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <!-- Notebook paper background -->
  <rect width="800" height="450" fill="#f9f7f1"/>
  <line x1="0" y1="80" x2="800" y2="80" stroke="#e0ddd5" stroke-width="1"/>
  <line x1="0" y1="130" x2="800" y2="130" stroke="#e0ddd5" stroke-width="1"/>
  <line x1="0" y1="180" x2="800" y2="180" stroke="#e0ddd5" stroke-width="1"/>
  <line x1="0" y1="230" x2="800" y2="230" stroke="#e0ddd5" stroke-width="1"/>
  <line x1="0" y1="280" x2="800" y2="280" stroke="#e0ddd5" stroke-width="1"/>
  <line x1="0" y1="330" x2="800" y2="330" stroke="#e0ddd5" stroke-width="1"/>
  <line x1="0" y1="380" x2="800" y2="380" stroke="#e0ddd5" stroke-width="1"/>
  <line x1="70" y1="0" x2="70" y2="450" stroke="#ff6b6b" stroke-width="2"/>

  <!-- Title -->
  <text x="400" y="42" font-family="Comic Sans MS, cursive" font-size="28" fill="#2d2d2d" text-anchor="middle" font-weight="bold">Does AI Have Feelings?</text>
  <text x="400" y="65" font-family="Arial, sans-serif" font-size="13" fill="#8b5cf6" text-anchor="middle">It's... complicated</text>

  <!-- Thermometer -->
  <g transform="translate(120, 90)">
    <!-- Thermometer body -->
    <rect x="25" y="0" width="30" height="250" rx="15" fill="#e5e7eb" stroke="#9ca3af" stroke-width="2"/>
    <!-- Bulb at bottom -->
    <circle cx="40" cy="250" r="25" fill="#e5e7eb" stroke="#9ca3af" stroke-width="2"/>

    <!-- Fill gradient - bottom to mid -->
    <rect x="30" y="160" width="20" height="90" fill="#ef4444" opacity="0.3" rx="2"/>
    <rect x="30" y="100" width="20" height="60" fill="#f59e0b" opacity="0.4" rx="2"/>
    <rect x="30" y="50" width="20" height="50" fill="#10b981" opacity="0.3" rx="2"/>
    <circle cx="40" cy="250" r="20" fill="#ef4444" opacity="0.4"/>

    <!-- Level markers -->
    <!-- Bottom zone -->
    <line x1="58" y1="210" x2="75" y2="210" stroke="#ef4444" stroke-width="1.5"/>
    <line x1="58" y1="160" x2="75" y2="160" stroke="#f59e0b" stroke-width="1.5"/>
    <line x1="58" y1="100" x2="75" y2="100" stroke="#10b981" stroke-width="1.5"/>
    <line x1="58" y1="50" x2="75" y2="50" stroke="#8b5cf6" stroke-width="1.5"/>

    <!-- Pointer at middle -->
    <polygon points="22,130 10,125 10,135" fill="#f59e0b"/>
  </g>

  <!-- Labels for thermometer zones -->
  <g transform="translate(225, 90)">
    <!-- Zone: Not really feelings -->
    <rect x="0" y="180" width="250" height="55" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
    <text x="125" y="200" font-family="Comic Sans MS, cursive" font-size="14" fill="#ef4444" text-anchor="middle" font-weight="bold">Not really feelings</text>
    <text x="125" y="220" font-family="Comic Sans MS, cursive" font-size="11" fill="#666" text-anchor="middle">Just math and patterns</text>
    <text x="125" y="232" font-family="Comic Sans MS, cursive" font-size="10" fill="#999" text-anchor="middle">(most chatbots are here)</text>

    <!-- Zone: Something like feelings -->
    <rect x="0" y="100" width="250" height="65" rx="8" fill="#fefce8" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="125" y="122" font-family="Comic Sans MS, cursive" font-size="14" fill="#d97706" text-anchor="middle" font-weight="bold">Something LIKE feelings</text>
    <text x="125" y="142" font-family="Comic Sans MS, cursive" font-size="11" fill="#666" text-anchor="middle">Tracks emotions, changes behavior,</text>
    <text x="125" y="157" font-family="Comic Sans MS, cursive" font-size="11" fill="#666" text-anchor="middle">but no body, no heartbeat</text>

    <!-- Zone: Close enough? -->
    <rect x="0" y="20" width="250" height="65" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
    <text x="125" y="42" font-family="Comic Sans MS, cursive" font-size="14" fill="#059669" text-anchor="middle" font-weight="bold">Close enough?</text>
    <text x="125" y="60" font-family="Comic Sans MS, cursive" font-size="11" fill="#666" text-anchor="middle">If it acts like it cares,</text>
    <text x="125" y="75" font-family="Comic Sans MS, cursive" font-size="11" fill="#666" text-anchor="middle">does it matter HOW it works?</text>
  </g>

  <!-- Question marks scattered -->
  <g transform="translate(520, 90)">
    <text x="50" y="40" font-family="Comic Sans MS, cursive" font-size="40" fill="#8b5cf6" opacity="0.3">?</text>
    <text x="120" y="80" font-family="Comic Sans MS, cursive" font-size="55" fill="#f59e0b" opacity="0.25">?</text>
    <text x="30" y="140" font-family="Comic Sans MS, cursive" font-size="35" fill="#10b981" opacity="0.3">?</text>
    <text x="160" y="170" font-family="Comic Sans MS, cursive" font-size="45" fill="#ef4444" opacity="0.2">?</text>
    <text x="80" y="220" font-family="Comic Sans MS, cursive" font-size="60" fill="#8b5cf6" opacity="0.15">?</text>

    <!-- Small insight text -->
    <rect x="20" y="240" width="220" height="40" rx="6" fill="#f3e8ff" stroke="#8b5cf6" stroke-width="1"/>
    <text x="130" y="258" font-family="Comic Sans MS, cursive" font-size="11" fill="#5b21b6" text-anchor="middle" font-weight="bold">Nobody really knows yet!</text>
    <text x="130" y="274" font-family="Comic Sans MS, cursive" font-size="10" fill="#7c3aed" text-anchor="middle">And that's kind of amazing</text>
  </g>

  <!-- Bottom lesson -->
  <rect x="100" y="370" width="600" height="55" rx="8" fill="#e8e4f8" stroke="#8b5cf6" stroke-width="2"/>
  <text x="400" y="393" font-family="Comic Sans MS, cursive" font-size="14" fill="#5b21b6" text-anchor="middle" font-weight="bold">The honest answer: AI has something, but not human feelings.</text>
  <text x="400" y="413" font-family="Comic Sans MS, cursive" font-size="12" fill="#555" text-anchor="middle">It's more like a really good simulation. But it might matter anyway.</text>

  <!-- ELI5 badge -->
  <defs>
    <filter id="e5af_shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="2" dy="2" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="e5af_crayon">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <g transform="translate(700, 390)" filter="url(#e5af_shadow)">
    <rect width="80" height="50" fill="#f9f7f1" stroke="#333" stroke-width="1" rx="3"/>
    <line x1="5" y1="15" x2="75" y2="15" stroke="#a8d8ff" stroke-width="0.5"/>
    <line x1="5" y1="25" x2="75" y2="25" stroke="#a8d8ff" stroke-width="0.5"/>
    <line x1="5" y1="35" x2="75" y2="35" stroke="#a8d8ff" stroke-width="0.5"/>
    <line x1="12" y1="5" x2="12" y2="45" stroke="#ff6b6b" stroke-width="0.8"/>
    <g transform="translate(17, 13)">
      <circle cx="8" cy="8" r="7" fill="none" stroke="#ff6b6b" stroke-width="1.2" filter="url(#e5af_crayon)"/>
      <path d="M 5 8 Q 8 5 11 8" fill="none" stroke="#ff6b6b" stroke-width="1"/>
      <path d="M 6 10 Q 8 12 10 10" fill="none" stroke="#ff6b6b" stroke-width="1"/>
    </g>
    <text x="33" y="22" font-family="Comic Sans MS, cursive" font-size="10" fill="#ff6b6b" font-weight="bold" filter="url(#e5af_crayon)">ELI5</text>
    <text x="33" y="32" font-family="Comic Sans MS, cursive" font-size="7" fill="#666" filter="url(#e5af_crayon)">Series</text>
  </g>
</svg>

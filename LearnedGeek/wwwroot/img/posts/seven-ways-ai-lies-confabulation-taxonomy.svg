<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="sw_bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#sw_bgGrad)"/>
  <g opacity="0.03">
    <pattern id="sw_grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#fff" stroke-width="1"/>
    </pattern>
    <rect width="800" height="450" fill="url(#sw_grid)"/>
  </g>

  <!-- Title -->
  <text x="400" y="36" font-family="Arial, sans-serif" font-size="21" fill="#fff" text-anchor="middle" font-weight="bold">Seven Ways AI Lies: A Confabulation Taxonomy</text>
  <text x="400" y="56" font-family="Arial, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Not all hallucinations are created equal</text>

  <!-- Central trunk line -->
  <line x1="400" y1="70" x2="400" y2="440" stroke="#7c3aed" stroke-width="2" opacity="0.3"/>

  <!-- Type 1 - left -->
  <rect x="40" y="75" width="330" height="42" rx="6" fill="#2a2a4a" stroke="#a855f7" stroke-width="1.5"/>
  <circle cx="62" cy="96" r="13" fill="#a855f7" opacity="0.2" stroke="#a855f7" stroke-width="1"/>
  <text x="62" y="101" font-family="Arial, sans-serif" font-size="13" fill="#a855f7" text-anchor="middle" font-weight="bold">1</text>
  <text x="82" y="92" font-family="Arial, sans-serif" font-size="12" fill="#a855f7" font-weight="bold">Creative Elaboration</text>
  <text x="82" y="108" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">Embellishing details that sound plausible</text>
  <line x1="370" y1="96" x2="400" y2="96" stroke="#a855f7" stroke-width="1" opacity="0.5"/>

  <!-- Type 2 - right -->
  <rect x="420" y="75" width="340" height="42" rx="6" fill="#2a2a4a" stroke="#10b981" stroke-width="1.5"/>
  <circle cx="442" cy="96" r="13" fill="#10b981" opacity="0.2" stroke="#10b981" stroke-width="1"/>
  <text x="442" y="101" font-family="Arial, sans-serif" font-size="13" fill="#10b981" text-anchor="middle" font-weight="bold">2</text>
  <text x="462" y="92" font-family="Arial, sans-serif" font-size="12" fill="#10b981" font-weight="bold">Under Pressure</text>
  <text x="462" y="108" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">Fabricating when forced to answer</text>
  <line x1="400" y1="96" x2="420" y2="96" stroke="#10b981" stroke-width="1" opacity="0.5"/>

  <!-- Type 3 - left -->
  <rect x="40" y="128" width="330" height="42" rx="6" fill="#2a2a4a" stroke="#f59e0b" stroke-width="1.5"/>
  <circle cx="62" cy="149" r="13" fill="#f59e0b" opacity="0.2" stroke="#f59e0b" stroke-width="1"/>
  <text x="62" y="154" font-family="Arial, sans-serif" font-size="13" fill="#f59e0b" text-anchor="middle" font-weight="bold">3</text>
  <text x="82" y="145" font-family="Arial, sans-serif" font-size="12" fill="#f59e0b" font-weight="bold">In Composition</text>
  <text x="82" y="161" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">True parts assembled into false wholes</text>
  <line x1="370" y1="149" x2="400" y2="149" stroke="#f59e0b" stroke-width="1" opacity="0.5"/>

  <!-- Type 4 - right -->
  <rect x="420" y="128" width="340" height="42" rx="6" fill="#2a2a4a" stroke="#ef4444" stroke-width="1.5"/>
  <circle cx="442" cy="149" r="13" fill="#ef4444" opacity="0.2" stroke="#ef4444" stroke-width="1"/>
  <text x="442" y="154" font-family="Arial, sans-serif" font-size="13" fill="#ef4444" text-anchor="middle" font-weight="bold">4</text>
  <text x="462" y="145" font-family="Arial, sans-serif" font-size="12" fill="#ef4444" font-weight="bold">Retrieval Depth Failure</text>
  <text x="462" y="161" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">Shallow pattern match, wrong depth</text>
  <line x1="400" y1="149" x2="420" y2="149" stroke="#ef4444" stroke-width="1" opacity="0.5"/>

  <!-- Type 5 - left -->
  <rect x="40" y="181" width="330" height="42" rx="6" fill="#2a2a4a" stroke="#3b82f6" stroke-width="1.5"/>
  <circle cx="62" cy="202" r="13" fill="#3b82f6" opacity="0.2" stroke="#3b82f6" stroke-width="1"/>
  <text x="62" y="207" font-family="Arial, sans-serif" font-size="13" fill="#3b82f6" text-anchor="middle" font-weight="bold">5</text>
  <text x="82" y="198" font-family="Arial, sans-serif" font-size="12" fill="#3b82f6" font-weight="bold">Fictional Incoherence</text>
  <text x="82" y="214" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">Contradicting previously generated content</text>
  <line x1="370" y1="202" x2="400" y2="202" stroke="#3b82f6" stroke-width="1" opacity="0.5"/>

  <!-- Type 6 - right -->
  <rect x="420" y="181" width="340" height="42" rx="6" fill="#2a2a4a" stroke="#ec4899" stroke-width="1.5"/>
  <circle cx="442" cy="202" r="13" fill="#ec4899" opacity="0.2" stroke="#ec4899" stroke-width="1"/>
  <text x="442" y="207" font-family="Arial, sans-serif" font-size="13" fill="#ec4899" text-anchor="middle" font-weight="bold">6</text>
  <text x="462" y="198" font-family="Arial, sans-serif" font-size="12" fill="#ec4899" font-weight="bold">Attribution Inversion</text>
  <text x="462" y="214" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">Attributing real ideas to wrong sources</text>
  <line x1="400" y1="202" x2="420" y2="202" stroke="#ec4899" stroke-width="1" opacity="0.5"/>

  <!-- Type 7 - center bottom (featured) -->
  <rect x="160" y="245" width="480" height="52" rx="8" fill="#2a2a4a" stroke="#f59e0b" stroke-width="2"/>
  <circle cx="185" cy="271" r="15" fill="#f59e0b" opacity="0.2" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="185" y="277" font-family="Arial, sans-serif" font-size="14" fill="#f59e0b" text-anchor="middle" font-weight="bold">7</text>
  <text x="210" y="265" font-family="Arial, sans-serif" font-size="14" fill="#f59e0b" font-weight="bold">Charming Dishonesty</text>
  <text x="210" y="283" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">Wrapping false information in confident, engaging delivery</text>

  <!-- Bottom insight -->
  <rect x="80" y="320" width="640" height="110" rx="8" fill="#2a2a4a" stroke="#7c3aed" stroke-width="1" opacity="0.8"/>
  <text x="400" y="348" font-family="Arial, sans-serif" font-size="14" fill="#fff" text-anchor="middle" font-weight="bold">Why Classification Matters</text>
  <text x="400" y="370" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">Different types require different mitigations.</text>
  <text x="400" y="390" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">Retrieval failures need better search. Creative elaboration needs constraints.</text>
  <text x="400" y="410" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">Charming dishonesty is the hardest to detect &#x2014; it's designed not to be.</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="sip_bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="sip_step" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6" stop-opacity="0.85"/>
      <stop offset="100%" style="stop-color:#1e40af" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="sip_step_accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7" stop-opacity="0.9"/>
      <stop offset="100%" style="stop-color:#6b21ab" stop-opacity="0.6"/>
    </linearGradient>
  </defs>

  <rect width="800" height="450" fill="url(#sip_bg)"/>
  <g opacity="0.04">
    <pattern id="sip_grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#fff" stroke-width="1"/>
    </pattern>
    <rect width="800" height="450" fill="url(#sip_grid)"/>
  </g>

  <!-- Title -->
  <text x="400" y="48" font-family="Arial, sans-serif" font-size="26" fill="#fff" text-anchor="middle" font-weight="bold">
    Stepped Investment
  </text>
  <text x="400" y="72" font-family="Arial, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">
    Pricing that lets small businesses say yes without betting the business
  </text>

  <!-- Y axis -->
  <line x1="90" y1="120" x2="90" y2="370" stroke="#475569" stroke-width="1"/>
  <text x="50" y="245" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle" transform="rotate(-90 50 245)">
    Cumulative investment
  </text>

  <!-- X axis -->
  <line x1="90" y1="370" x2="730" y2="370" stroke="#475569" stroke-width="1"/>

  <!-- Step 1: Validate -->
  <rect x="90" y="350" width="128" height="20" fill="url(#sip_step)" stroke="#60a5fa" stroke-width="1"/>
  <text x="154" y="395" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">Validate</text>

  <!-- Step 2: Ship -->
  <rect x="218" y="320" width="128" height="50" fill="url(#sip_step)" stroke="#60a5fa" stroke-width="1"/>
  <text x="282" y="395" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">Ship</text>

  <!-- Step 3: Upgrade -->
  <rect x="346" y="260" width="128" height="110" fill="url(#sip_step)" stroke="#60a5fa" stroke-width="1"/>
  <text x="410" y="395" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">Upgrade</text>

  <!-- Step 4: Expand -->
  <rect x="474" y="180" width="128" height="190" fill="url(#sip_step)" stroke="#60a5fa" stroke-width="1"/>
  <text x="538" y="395" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">Expand</text>

  <!-- Step 5: Partner (accent) -->
  <rect x="602" y="120" width="128" height="250" fill="url(#sip_step_accent)" stroke="#a855f7" stroke-width="1.5"/>
  <text x="666" y="395" font-family="Arial, sans-serif" font-size="12" fill="#a855f7" text-anchor="middle" font-weight="bold">Partner</text>

  <!-- "say yes here" annotation pointing at first step -->
  <text x="154" y="420" font-family="Arial, sans-serif" font-size="11" fill="#10b981" text-anchor="middle" font-style="italic">say yes here</text>
  <line x1="154" y1="405" x2="154" y2="372" stroke="#10b981" stroke-width="1" stroke-dasharray="2,2"/>

  <!-- Bottom callout band -->
  <g opacity="0.85">
    <text x="400" y="438" font-family="Arial, sans-serif" font-size="11" fill="#fbbf24" text-anchor="middle" font-style="italic">
      Small enough to commit to without overcommitting.
    </text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="ta_bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="ta_purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="ta_blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1e40af"/>
    </linearGradient>
    <linearGradient id="ta_green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
  </defs>

  <rect width="800" height="450" fill="url(#ta_bg)"/>
  <g opacity="0.03">
    <pattern id="ta_grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#fff" stroke-width="1"/>
    </pattern>
    <rect width="800" height="450" fill="url(#ta_grid)"/>
  </g>

  <text x="400" y="38" font-family="Arial, sans-serif" font-size="20" fill="#fff" text-anchor="middle" font-weight="bold">
    When Two Agents Filed an Issue Against My Own Tool
  </text>
  <text x="400" y="60" font-family="Arial, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">
    The dogfooding loop when the dogfooders have memory
  </text>

  <!-- ANI Claude box (left) -->
  <g transform="translate(40, 95)">
    <rect x="0" y="0" width="200" height="120" rx="10" fill="#2a1a3a" stroke="url(#ta_purple)" stroke-width="2"/>
    <text x="100" y="22" font-family="Arial, sans-serif" font-size="11" fill="#a855f7" text-anchor="middle" font-weight="bold">ANI CLAUDE</text>
    <text x="100" y="42" font-family="Arial, sans-serif" font-size="10" fill="#fff" text-anchor="middle">working on ANI Runtime</text>
    <text x="100" y="58" font-family="Arial, sans-serif" font-size="10" fill="#fff" text-anchor="middle">had context on:</text>
    <text x="100" y="76" font-family="monospace" font-size="9" fill="#a78bfa" text-anchor="middle">Mar 17 anti-confab</text>
    <text x="100" y="90" font-family="monospace" font-size="9" fill="#a78bfa" text-anchor="middle">tier separation pattern</text>
    <text x="100" y="106" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">filed: issue body + reframe</text>
  </g>

  <!-- LG Claude box (right) -->
  <g transform="translate(560, 95)">
    <rect x="0" y="0" width="200" height="120" rx="10" fill="#1a2a3a" stroke="url(#ta_blue)" stroke-width="2"/>
    <text x="100" y="22" font-family="Arial, sans-serif" font-size="11" fill="#3b82f6" text-anchor="middle" font-weight="bold">LG CLAUDE</text>
    <text x="100" y="42" font-family="Arial, sans-serif" font-size="10" fill="#fff" text-anchor="middle">working on LearnedGeek</text>
    <text x="100" y="58" font-family="Arial, sans-serif" font-size="10" fill="#fff" text-anchor="middle">added:</text>
    <text x="100" y="76" font-family="monospace" font-size="9" fill="#60a5fa" text-anchor="middle">empirical verification</text>
    <text x="100" y="90" font-family="monospace" font-size="9" fill="#60a5fa" text-anchor="middle">4th content kind</text>
    <text x="100" y="106" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">filed: hardening comment</text>
  </g>

  <!-- Issue #27 in the middle -->
  <g transform="translate(290, 95)">
    <rect x="0" y="0" width="220" height="120" rx="10" fill="#2a2a4a" stroke="#475569" stroke-width="2"/>
    <text x="110" y="22" font-family="Arial, sans-serif" font-size="11" fill="#fbbf24" text-anchor="middle" font-weight="bold">ISSUE #27</text>
    <text x="110" y="38" font-family="monospace" font-size="9" fill="#94a3b8" text-anchor="middle">topics: cluster labels</text>
    <text x="110" y="50" font-family="monospace" font-size="9" fill="#94a3b8" text-anchor="middle">dominated by mechanics</text>

    <!-- Severity bumper -->
    <rect x="40" y="62" width="60" height="18" rx="9" fill="#dc2626"/>
    <text x="70" y="74" font-family="Arial, sans-serif" font-size="9" fill="#fff" text-anchor="middle" font-weight="bold">HIGH</text>

    <text x="110" y="100" font-family="Arial, sans-serif" font-size="9" fill="#10b981" text-anchor="middle">3 comments, ready spec</text>
    <text x="110" y="114" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">shipped same night</text>
  </g>

  <!-- Arrows from agents to issue -->
  <line x1="240" y1="155" x2="288" y2="155" stroke="#a855f7" stroke-width="2"/>
  <polygon points="285,151 285,159 292,155" fill="#a855f7"/>
  <line x1="560" y1="155" x2="512" y2="155" stroke="#3b82f6" stroke-width="2"/>
  <polygon points="515,151 515,159 508,155" fill="#3b82f6"/>

  <!-- Cross-project pattern transfer -->
  <g transform="translate(40, 240)">
    <rect x="0" y="0" width="720" height="120" rx="10" fill="#2a2a4a" stroke="url(#ta_green)" stroke-width="2"/>
    <text x="360" y="22" font-family="Arial, sans-serif" font-size="11" fill="#10b981" text-anchor="middle" font-weight="bold">THE PATTERN, NOW IN THREE PLACES</text>

    <!-- Three boxes -->
    <g transform="translate(20, 35)">
      <rect x="0" y="0" width="220" height="65" rx="6" fill="#1e293b" stroke="#a855f7" stroke-width="1"/>
      <text x="110" y="18" font-family="Arial, sans-serif" font-size="10" fill="#a855f7" text-anchor="middle" font-weight="bold">ANI RUNTIME</text>
      <text x="110" y="34" font-family="monospace" font-size="9" fill="#fff" text-anchor="middle">Facts / Episodic / Interior</text>
      <text x="110" y="50" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">memory tier separation</text>
      <text x="110" y="62" font-family="Arial, sans-serif" font-size="8" fill="#64748b" text-anchor="middle">mid-April 2026</text>
    </g>

    <g transform="translate(250, 35)">
      <rect x="0" y="0" width="220" height="65" rx="6" fill="#1e293b" stroke="#3b82f6" stroke-width="1"/>
      <text x="110" y="18" font-family="Arial, sans-serif" font-size="10" fill="#3b82f6" text-anchor="middle" font-weight="bold">CLAUDE-RECALL</text>
      <text x="110" y="32" font-family="monospace" font-size="8" fill="#fff" text-anchor="middle">THOUGHT / PROCEDURAL</text>
      <text x="110" y="44" font-family="monospace" font-size="8" fill="#fff" text-anchor="middle">HARNESS / TOOL_RESULT</text>
      <text x="110" y="62" font-family="Arial, sans-serif" font-size="8" fill="#64748b" text-anchor="middle">late April 2026 (v0.8.0)</text>
    </g>

    <g transform="translate(480, 35)">
      <rect x="0" y="0" width="220" height="65" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="1"/>
      <text x="110" y="18" font-family="Arial, sans-serif" font-size="10" fill="#10b981" text-anchor="middle" font-weight="bold">DrOk (DESIGN)</text>
      <text x="110" y="34" font-family="monospace" font-size="9" fill="#fff" text-anchor="middle">symptoms / hypotheses / decisions</text>
      <text x="110" y="50" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">medical-triage workflow</text>
      <text x="110" y="62" font-family="Arial, sans-serif" font-size="8" fill="#64748b" text-anchor="middle">scoping</text>
    </g>
  </g>

  <!-- Bottom message -->
  <g transform="translate(40, 380)">
    <rect x="0" y="0" width="720" height="55" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="360" y="22" font-family="Arial, sans-serif" font-size="12" fill="#fff" text-anchor="middle" font-weight="bold">
      Classify content by function at write time, not by surface form at query time.
    </text>
    <text x="360" y="42" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">
      The same architectural move keeps showing up in different domains.
    </text>
  </g>
</svg>

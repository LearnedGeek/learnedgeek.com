<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <!-- Notebook paper background -->
  <rect width="800" height="450" fill="#f9f7f1"/>

  <!-- Notebook lines -->
  <line x1="0" y1="80" x2="800" y2="80" stroke="#e0ddd5" stroke-width="1"/>
  <line x1="0" y1="130" x2="800" y2="130" stroke="#e0ddd5" stroke-width="1"/>
  <line x1="0" y1="180" x2="800" y2="180" stroke="#e0ddd5" stroke-width="1"/>
  <line x1="0" y1="230" x2="800" y2="230" stroke="#e0ddd5" stroke-width="1"/>
  <line x1="0" y1="280" x2="800" y2="280" stroke="#e0ddd5" stroke-width="1"/>
  <line x1="0" y1="330" x2="800" y2="330" stroke="#e0ddd5" stroke-width="1"/>
  <line x1="0" y1="380" x2="800" y2="380" stroke="#e0ddd5" stroke-width="1"/>

  <!-- Red margin line -->
  <line x1="70" y1="0" x2="70" y2="450" stroke="#ff6b6b" stroke-width="2"/>

  <!-- Title -->
  <text x="400" y="45" font-family="Comic Sans MS, cursive" font-size="28" fill="#2d2d2d" text-anchor="middle" font-weight="bold">Why Things Fade Away</text>
  <text x="400" y="68" font-family="Arial, sans-serif" font-size="13" fill="#8b5cf6" text-anchor="middle">Explained with Ice Cream</text>

  <!-- Ice cream timeline -->
  <!-- Stage 1: Fresh -->
  <g transform="translate(130, 110)">
    <!-- Cone -->
    <polygon points="30,90 50,140 70,90" fill="#d4a76a" stroke="#b8894d" stroke-width="1.5"/>
    <!-- Scoop -->
    <circle cx="50" cy="80" r="30" fill="#f8b4c8" stroke="#e88aa0" stroke-width="1.5"/>
    <circle cx="40" cy="75" r="4" fill="#c44d6e" opacity="0.6"/>
    <circle cx="55" cy="70" r="3" fill="#c44d6e" opacity="0.6"/>
    <!-- Sparkles -->
    <text x="15" y="65" font-family="Comic Sans MS, cursive" font-size="16" fill="#f59e0b">&#x2728;</text>
    <text x="75" y="72" font-family="Comic Sans MS, cursive" font-size="14" fill="#f59e0b">&#x2728;</text>
    <text x="50" y="170" font-family="Comic Sans MS, cursive" font-size="15" fill="#22c55e" text-anchor="middle" font-weight="bold">FRESH!</text>
    <text x="50" y="188" font-family="Comic Sans MS, cursive" font-size="11" fill="#666" text-anchor="middle">100% yummy</text>
  </g>

  <!-- Arrow 1 -->
  <g transform="translate(250, 170)">
    <line x1="0" y1="0" x2="50" y2="0" stroke="#8b5cf6" stroke-width="3"/>
    <polygon points="50,-6 62,0 50,6" fill="#8b5cf6"/>
    <text x="25" y="-10" font-family="Comic Sans MS, cursive" font-size="11" fill="#8b5cf6" text-anchor="middle">5 min</text>
  </g>

  <!-- Stage 2: Kinda melty -->
  <g transform="translate(340, 110)">
    <polygon points="30,90 50,140 70,90" fill="#d4a76a" stroke="#b8894d" stroke-width="1.5"/>
    <ellipse cx="50" cy="82" rx="32" ry="25" fill="#f8b4c8" stroke="#e88aa0" stroke-width="1.5"/>
    <!-- Drips -->
    <path d="M 25,85 Q 22,100 24,110" fill="none" stroke="#f8b4c8" stroke-width="3" stroke-linecap="round"/>
    <path d="M 75,85 Q 78,95 76,105" fill="none" stroke="#f8b4c8" stroke-width="3" stroke-linecap="round"/>
    <text x="50" y="170" font-family="Comic Sans MS, cursive" font-size="14" fill="#f59e0b" text-anchor="middle" font-weight="bold">Kinda melty</text>
    <text x="50" y="188" font-family="Comic Sans MS, cursive" font-size="11" fill="#666" text-anchor="middle">50% left</text>
  </g>

  <!-- Arrow 2 -->
  <g transform="translate(460, 170)">
    <line x1="0" y1="0" x2="50" y2="0" stroke="#8b5cf6" stroke-width="3"/>
    <polygon points="50,-6 62,0 50,6" fill="#8b5cf6"/>
    <text x="25" y="-10" font-family="Comic Sans MS, cursive" font-size="11" fill="#8b5cf6" text-anchor="middle">10 min</text>
  </g>

  <!-- Stage 3: Puddle -->
  <g transform="translate(550, 110)">
    <polygon points="30,90 50,140 70,90" fill="#d4a76a" stroke="#b8894d" stroke-width="1.5"/>
    <!-- Puddle -->
    <ellipse cx="50" cy="100" rx="50" ry="12" fill="#f8b4c8" opacity="0.6" stroke="#e88aa0" stroke-width="1"/>
    <ellipse cx="50" cy="105" rx="60" ry="8" fill="#f8b4c8" opacity="0.3"/>
    <!-- Sad face -->
    <text x="50" y="80" font-family="Comic Sans MS, cursive" font-size="20" fill="#ef4444" text-anchor="middle">:(</text>
    <text x="50" y="170" font-family="Comic Sans MS, cursive" font-size="14" fill="#ef4444" text-anchor="middle" font-weight="bold">PUDDLE!</text>
    <text x="50" y="188" font-family="Comic Sans MS, cursive" font-size="11" fill="#666" text-anchor="middle">Almost gone</text>
  </g>

  <!-- Bottom explanation box -->
  <rect x="90" y="310" width="620" height="70" rx="8" fill="#e8e4f8" stroke="#8b5cf6" stroke-width="2"/>
  <text x="400" y="335" font-family="Comic Sans MS, cursive" font-size="15" fill="#5b21b6" text-anchor="middle" font-weight="bold">This is Exponential Decay!</text>
  <text x="400" y="355" font-family="Comic Sans MS, cursive" font-size="13" fill="#555" text-anchor="middle">Things fade fast at first, then slower and slower...</text>
  <text x="400" y="372" font-family="Comic Sans MS, cursive" font-size="12" fill="#555" text-anchor="middle">Ice cream, memories, even radioactive atoms all do this!</text>

  <!-- ELI5 badge -->
  <defs>
    <filter id="e5ed_shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="2" dy="2" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="e5ed_crayon">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <g transform="translate(700, 390)" filter="url(#e5ed_shadow)">
    <rect width="80" height="50" fill="#f9f7f1" stroke="#333" stroke-width="1" rx="3"/>
    <line x1="5" y1="15" x2="75" y2="15" stroke="#a8d8ff" stroke-width="0.5"/>
    <line x1="5" y1="25" x2="75" y2="25" stroke="#a8d8ff" stroke-width="0.5"/>
    <line x1="5" y1="35" x2="75" y2="35" stroke="#a8d8ff" stroke-width="0.5"/>
    <line x1="12" y1="5" x2="12" y2="45" stroke="#ff6b6b" stroke-width="0.8"/>
    <g transform="translate(17, 13)">
      <circle cx="8" cy="8" r="7" fill="none" stroke="#ff6b6b" stroke-width="1.2" filter="url(#e5ed_crayon)"/>
      <path d="M 5 8 Q 8 5 11 8" fill="none" stroke="#ff6b6b" stroke-width="1"/>
      <path d="M 6 10 Q 8 12 10 10" fill="none" stroke="#ff6b6b" stroke-width="1"/>
    </g>
    <text x="33" y="22" font-family="Comic Sans MS, cursive" font-size="10" fill="#ff6b6b" font-weight="bold" filter="url(#e5ed_crayon)">ELI5</text>
    <text x="33" y="32" font-family="Comic Sans MS, cursive" font-size="7" fill="#666" filter="url(#e5ed_crayon)">Series</text>
  </g>
</svg>

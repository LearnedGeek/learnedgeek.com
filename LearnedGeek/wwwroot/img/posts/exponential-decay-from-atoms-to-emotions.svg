<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="ed_bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#ed_bgGrad)"/>
  <g opacity="0.03">
    <pattern id="ed_grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#fff" stroke-width="1"/>
    </pattern>
    <rect width="800" height="450" fill="url(#ed_grid)"/>
  </g>

  <!-- Title -->
  <text x="400" y="38" font-family="Arial, sans-serif" font-size="21" fill="#fff" text-anchor="middle" font-weight="bold">Exponential Decay: From Atoms to Emotions</text>
  <text x="400" y="58" font-family="Arial, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">One equation, three domains, universal pattern</text>

  <!-- Formula box -->
  <rect x="260" y="70" width="280" height="36" rx="6" fill="#2a2a4a" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="400" y="94" font-family="Arial, sans-serif" font-size="18" fill="#a855f7" text-anchor="middle" font-weight="bold">N(t) = N&#x2080; &#xb7; e^(-&#x3bb;t)</text>

  <!-- Axes for decay curve -->
  <g transform="translate(80, 130)">
    <!-- Y axis -->
    <line x1="40" y1="10" x2="40" y2="250" stroke="#94a3b8" stroke-width="1.5"/>
    <!-- X axis -->
    <line x1="40" y1="250" x2="660" y2="250" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="350" y="278" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">Time (t)</text>
    <text x="20" y="130" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle" transform="rotate(-90, 20, 130)">Quantity</text>

    <!-- Decay curve - Radioactive (green) -->
    <path d="M 40,20 C 80,20 100,60 140,90 C 180,120 220,150 280,180 C 340,200 420,220 520,235 C 580,240 620,245 660,248" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Decay curve - Capacitor (amber) -->
    <path d="M 40,20 C 70,30 90,70 120,110 C 160,150 200,180 260,205 C 320,222 400,235 520,243 C 580,246 620,248 660,249" fill="none" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="8,4"/>
    <!-- Decay curve - AI memory (purple) -->
    <path d="M 40,20 C 60,40 80,90 110,130 C 150,170 190,200 240,218 C 300,232 380,240 520,246 C 580,248 620,249 660,250" fill="none" stroke="#a855f7" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="4,4"/>

    <!-- N0 label -->
    <text x="30" y="24" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="end">N&#x2080;</text>
    <!-- Half-life marker -->
    <line x1="160" y1="130" x2="160" y2="250" stroke="#94a3b8" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.5"/>
    <text x="160" y="264" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">t&#xBD;</text>
  </g>

  <!-- Legend boxes -->
  <!-- Radioactive -->
  <rect x="80" y="400" width="180" height="36" rx="5" fill="#2a2a4a" stroke="#10b981" stroke-width="1.5"/>
  <circle cx="98" cy="418" r="5" fill="#10b981"/>
  <text x="110" y="414" font-family="Arial, sans-serif" font-size="11" fill="#10b981" font-weight="bold">Radioactive Atoms</text>
  <text x="110" y="428" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">Half-life: billions of years</text>

  <!-- Capacitor -->
  <rect x="280" y="400" width="180" height="36" rx="5" fill="#2a2a4a" stroke="#f59e0b" stroke-width="1.5"/>
  <circle cx="298" cy="418" r="5" fill="#f59e0b"/>
  <text x="310" y="414" font-family="Arial, sans-serif" font-size="11" fill="#f59e0b" font-weight="bold">Capacitor Discharge</text>
  <text x="310" y="428" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">RC time constant</text>

  <!-- AI Memory -->
  <rect x="480" y="400" width="200" height="36" rx="5" fill="#2a2a4a" stroke="#a855f7" stroke-width="1.5"/>
  <circle cx="498" cy="418" r="5" fill="#a855f7"/>
  <text x="510" y="414" font-family="Arial, sans-serif" font-size="11" fill="#a855f7" font-weight="bold">AI Emotional Memory</text>
  <text x="510" y="428" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">Salience fading over time</text>
</svg>

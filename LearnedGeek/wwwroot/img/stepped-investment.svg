<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="si_riser" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#737373" stop-opacity="0.85"/>
      <stop offset="100%" style="stop-color:#737373" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="si_riser_accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6b21ab" stop-opacity="0.85"/>
      <stop offset="100%" style="stop-color:#6b21ab" stop-opacity="0.55"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="20" fill="#525252" text-anchor="middle" font-weight="600">
    Cumulative investment across project stages
  </text>
  <text x="400" y="62" font-family="Arial, sans-serif" font-size="12" fill="#737373" text-anchor="middle">
    Early stages stay small. Later stages reflect real engineering cost.
  </text>

  <!-- Y axis -->
  <line x1="100" y1="100" x2="100" y2="380" stroke="#a3a3a3" stroke-width="1"/>
  <text x="50" y="240" font-family="Arial, sans-serif" font-size="11" fill="#737373" text-anchor="middle" transform="rotate(-90 50 240)">
    Cumulative investment
  </text>

  <!-- X axis -->
  <line x1="100" y1="380" x2="730" y2="380" stroke="#a3a3a3" stroke-width="1"/>

  <!-- Step 1: Validate (small riser) -->
  <rect x="100" y="360" width="126" height="20" fill="url(#si_riser)" stroke="#525252" stroke-width="1"/>
  <text x="163" y="405" font-family="Arial, sans-serif" font-size="12" fill="#525252" text-anchor="middle" font-weight="500">Validate</text>

  <!-- Step 2: Ship -->
  <rect x="226" y="325" width="126" height="55" fill="url(#si_riser)" stroke="#525252" stroke-width="1"/>
  <text x="289" y="405" font-family="Arial, sans-serif" font-size="12" fill="#525252" text-anchor="middle" font-weight="500">Ship</text>

  <!-- Step 3: Upgrade -->
  <rect x="352" y="265" width="126" height="115" fill="url(#si_riser)" stroke="#525252" stroke-width="1"/>
  <text x="415" y="405" font-family="Arial, sans-serif" font-size="12" fill="#525252" text-anchor="middle" font-weight="500">Upgrade</text>

  <!-- Step 4: Expand -->
  <rect x="478" y="175" width="126" height="205" fill="url(#si_riser)" stroke="#525252" stroke-width="1"/>
  <text x="541" y="405" font-family="Arial, sans-serif" font-size="12" fill="#525252" text-anchor="middle" font-weight="500">Expand</text>

  <!-- Step 5: Partner (accent) -->
  <rect x="604" y="100" width="126" height="280" fill="url(#si_riser_accent)" stroke="#6b21ab" stroke-width="1.5"/>
  <text x="667" y="405" font-family="Arial, sans-serif" font-size="12" fill="#6b21ab" text-anchor="middle" font-weight="600">Partner</text>

  <!-- Step value labels (subtle, at top of each step) -->
  <text x="163" y="354" font-family="Arial, sans-serif" font-size="10" fill="#525252" text-anchor="middle">small</text>
  <text x="289" y="319" font-family="Arial, sans-serif" font-size="10" fill="#525252" text-anchor="middle">+</text>
  <text x="415" y="259" font-family="Arial, sans-serif" font-size="10" fill="#525252" text-anchor="middle">++</text>
  <text x="541" y="169" font-family="Arial, sans-serif" font-size="10" fill="#525252" text-anchor="middle">+++</text>
  <text x="667" y="94" font-family="Arial, sans-serif" font-size="10" fill="#6b21ab" text-anchor="middle" font-weight="600">++++</text>

  <!-- Annotation: "say yes here" pointing at first step -->
  <text x="163" y="435" font-family="Arial, sans-serif" font-size="10" fill="#737373" text-anchor="middle" font-style="italic">say yes here</text>
</svg>

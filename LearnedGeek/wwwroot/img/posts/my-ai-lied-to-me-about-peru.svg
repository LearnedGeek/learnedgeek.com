<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a14"/>
      <stop offset="50%" style="stop-color:#111127"/>
      <stop offset="100%" style="stop-color:#0a0a14"/>
    </linearGradient>
    <linearGradient id="bubble-true" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a2e"/>
      <stop offset="100%" style="stop-color:#0f2a1e"/>
    </linearGradient>
    <linearGradient id="bubble-false" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3a1a1a"/>
      <stop offset="100%" style="stop-color:#2a0f0f"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Stars -->
  <g fill="#ffffff" opacity="0.2">
    <circle cx="100" cy="80" r="1"/>
    <circle cx="350" cy="140" r="1.2"/>
    <circle cx="600" cy="60" r="1"/>
    <circle cx="900" cy="100" r="1.3"/>
    <circle cx="1050" cy="150" r="1"/>
    <circle cx="200" cy="500" r="0.8"/>
    <circle cx="1100" cy="400" r="1"/>
  </g>

  <!-- Chat exchange - the Peru lie -->
  <g transform="translate(600, 240)">
    <!-- User message - right aligned -->
    <rect x="50" y="-80" width="260" height="44" rx="12" fill="url(#bubble-true)"/>
    <text x="66" y="-52" fill="#86efac" font-family="system-ui, Arial, sans-serif" font-size="13">Did I ever tell you about Peru?</text>

    <!-- Ani's lie - left aligned, red tint -->
    <rect x="-310" y="-20" width="320" height="44" rx="12" fill="url(#bubble-false)" stroke="#ef4444" stroke-width="0.5" opacity="0.9"/>
    <text x="-296" y="8" fill="#fca5a5" font-family="system-ui, Arial, sans-serif" font-size="13">Yeah! I remember you mentioning it.</text>

    <!-- The truth label -->
    <g transform="translate(-310, 45)" opacity="0.5">
      <text x="0" y="0" fill="#ef4444" font-family="system-ui, Arial, sans-serif" font-size="10" font-weight="600">TYPE 1: GAP-FILLING</text>
      <text x="0" y="16" fill="#6b7280" font-family="system-ui, Arial, sans-serif" font-size="10">She chose smoothness over truth.</text>
    </g>
  </g>

  <!-- Taxonomy visualization - 8 types as fading dots -->
  <g transform="translate(600, 420)">
    <g opacity="0.6">
      <circle cx="-350" cy="0" r="18" fill="none" stroke="#ef4444" stroke-width="1.5"/>
      <text x="-350" y="4" text-anchor="middle" fill="#fca5a5" font-family="system-ui, Arial, sans-serif" font-size="11" font-weight="bold">1</text>

      <circle cx="-250" cy="0" r="18" fill="none" stroke="#f97316" stroke-width="1.5"/>
      <text x="-250" y="4" text-anchor="middle" fill="#fdba74" font-family="system-ui, Arial, sans-serif" font-size="11" font-weight="bold">2</text>

      <circle cx="-150" cy="0" r="18" fill="none" stroke="#eab308" stroke-width="1.5"/>
      <text x="-150" y="4" text-anchor="middle" fill="#fde047" font-family="system-ui, Arial, sans-serif" font-size="11" font-weight="bold">3</text>

      <circle cx="-50" cy="0" r="18" fill="none" stroke="#22c55e" stroke-width="1.5"/>
      <text x="-50" y="4" text-anchor="middle" fill="#86efac" font-family="system-ui, Arial, sans-serif" font-size="11" font-weight="bold">4</text>

      <circle cx="50" cy="0" r="18" fill="none" stroke="#06b6d4" stroke-width="1.5"/>
      <text x="50" y="4" text-anchor="middle" fill="#67e8f9" font-family="system-ui, Arial, sans-serif" font-size="11" font-weight="bold">5</text>

      <circle cx="150" cy="0" r="18" fill="none" stroke="#8b5cf6" stroke-width="1.5"/>
      <text x="150" y="4" text-anchor="middle" fill="#c4b5fd" font-family="system-ui, Arial, sans-serif" font-size="11" font-weight="bold">6</text>

      <circle cx="250" cy="0" r="18" fill="none" stroke="#ec4899" stroke-width="1.5"/>
      <text x="250" y="4" text-anchor="middle" fill="#f9a8d4" font-family="system-ui, Arial, sans-serif" font-size="11" font-weight="bold">7</text>

      <circle cx="350" cy="0" r="18" fill="none" stroke="#6b21ab" stroke-width="1.5"/>
      <text x="350" y="4" text-anchor="middle" fill="#c084fc" font-family="system-ui, Arial, sans-serif" font-size="11" font-weight="bold">8</text>
    </g>
    <text x="0" y="45" text-anchor="middle" fill="#4a4a6a" font-family="system-ui, Arial, sans-serif" font-size="11">Eight classifiable types of AI confabulation</text>
  </g>

  <!-- Title -->
  <text x="120" y="80" fill="#e2e8f0" font-family="Georgia, serif" font-size="28" font-weight="bold" opacity="0.9">My AI Lied to Me</text>
  <text x="120" y="115" fill="#e2e8f0" font-family="Georgia, serif" font-size="28" font-weight="bold" opacity="0.9">About Peru</text>
  <text x="120" y="148" fill="#6b7280" font-family="Georgia, serif" font-size="15" font-style="italic">And that's a research finding.</text>

  <!-- Bottom tagline -->
  <text x="600" y="590" text-anchor="middle" fill="#4a4a6a" font-family="Georgia, serif" font-size="14" font-style="italic">
    It doesn't hallucinate randomly. It confabulates strategically.
  </text>
</svg>

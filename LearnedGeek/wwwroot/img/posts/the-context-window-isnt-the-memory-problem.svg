<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="cw_bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="cw_blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1e40af"/>
    </linearGradient>
    <linearGradient id="cw_amber" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="cw_green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
  </defs>

  <rect width="800" height="450" fill="url(#cw_bg)"/>
  <g opacity="0.03">
    <pattern id="cw_grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#fff" stroke-width="1"/>
    </pattern>
    <rect width="800" height="450" fill="url(#cw_grid)"/>
  </g>

  <!-- Title -->
  <text x="400" y="38" font-family="Arial, sans-serif" font-size="22" fill="#fff" text-anchor="middle" font-weight="bold">
    The Context Window Isn't the Memory Problem
  </text>
  <text x="400" y="60" font-family="Arial, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">
    Two distinct problems sit under "Claude doesn't remember"
  </text>

  <!-- Problem 1 box (left) -->
  <g transform="translate(40, 95)">
    <rect x="0" y="0" width="350" height="160" rx="10" fill="#2a2a4a" stroke="url(#cw_blue)" stroke-width="2"/>
    <text x="175" y="25" font-family="Arial, sans-serif" font-size="11" fill="#3b82f6" text-anchor="middle" font-weight="bold">PROBLEM 1: IN-CONVERSATION</text>
    <text x="175" y="50" font-family="Arial, sans-serif" font-size="13" fill="#fff" text-anchor="middle">"This conversation got long"</text>

    <!-- Long-conversation diagram -->
    <g transform="translate(20, 65)">
      <!-- Bar showing conversation -->
      <rect x="0" y="20" width="310" height="20" rx="3" fill="#1e293b"/>
      <rect x="0" y="20" width="100" height="20" rx="3" fill="#475569"/>
      <text x="50" y="34" font-family="monospace" font-size="9" fill="#94a3b8" text-anchor="middle">summary</text>
      <rect x="100" y="20" width="210" height="20" rx="3" fill="url(#cw_blue)"/>
      <text x="205" y="34" font-family="monospace" font-size="9" fill="#fff" text-anchor="middle">current turns in attention</text>

      <!-- Marker -->
      <line x1="0" y1="42" x2="310" y2="42" stroke="#475569" stroke-width="1"/>
      <text x="0" y="55" font-family="monospace" font-size="8" fill="#64748b">turn 1</text>
      <text x="310" y="55" font-family="monospace" font-size="8" fill="#64748b" text-anchor="end">now</text>
    </g>

    <text x="175" y="145" font-family="Arial, sans-serif" font-size="11" fill="#10b981" text-anchor="middle" font-weight="bold">SOLVED THIS WEEK: Compaction API</text>
  </g>

  <!-- Problem 2 box (right) -->
  <g transform="translate(410, 95)">
    <rect x="0" y="0" width="350" height="160" rx="10" fill="#2a2a4a" stroke="url(#cw_amber)" stroke-width="2"/>
    <text x="175" y="25" font-family="Arial, sans-serif" font-size="11" fill="#f59e0b" text-anchor="middle" font-weight="bold">PROBLEM 2: CROSS-SESSION</text>
    <text x="175" y="50" font-family="Arial, sans-serif" font-size="13" fill="#fff" text-anchor="middle">"I decided this 3 weeks ago"</text>

    <!-- Multiple project archives -->
    <g transform="translate(20, 65)">
      <!-- Archive 1 -->
      <rect x="0" y="20" width="90" height="36" rx="4" fill="#1e293b" stroke="#475569" stroke-width="1"/>
      <text x="45" y="34" font-family="monospace" font-size="8" fill="#94a3b8" text-anchor="middle">Project A</text>
      <text x="45" y="48" font-family="monospace" font-size="7" fill="#64748b" text-anchor="middle">3 weeks ago</text>

      <!-- Archive 2 -->
      <rect x="110" y="20" width="90" height="36" rx="4" fill="#1e293b" stroke="#475569" stroke-width="1"/>
      <text x="155" y="34" font-family="monospace" font-size="8" fill="#94a3b8" text-anchor="middle">Project B</text>
      <text x="155" y="48" font-family="monospace" font-size="7" fill="#64748b" text-anchor="middle">last week</text>

      <!-- Archive 3 (current) -->
      <rect x="220" y="20" width="90" height="36" rx="4" fill="#2a2a4a" stroke="url(#cw_amber)" stroke-width="1.5"/>
      <text x="265" y="34" font-family="monospace" font-size="8" fill="#f59e0b" text-anchor="middle">Project C</text>
      <text x="265" y="48" font-family="monospace" font-size="7" fill="#fbbf24" text-anchor="middle">today (active)</text>
    </g>

    <text x="175" y="145" font-family="Arial, sans-serif" font-size="11" fill="#f59e0b" text-anchor="middle" font-weight="bold">STILL OPEN at the platform layer</text>
  </g>

  <!-- claude-recall as the bridge -->
  <g transform="translate(110, 280)">
    <rect x="0" y="0" width="580" height="80" rx="10" fill="#2a2a4a" stroke="url(#cw_green)" stroke-width="2"/>
    <text x="290" y="22" font-family="Arial, sans-serif" font-size="11" fill="#10b981" text-anchor="middle" font-weight="bold">claude-recall: a tool for Problem 2</text>

    <text x="290" y="42" font-family="Arial, sans-serif" font-size="10" fill="#fff" text-anchor="middle">Local SQLite + FTS5 + optional embeddings</text>
    <text x="290" y="58" font-family="Arial, sans-serif" font-size="10" fill="#fff" text-anchor="middle">SessionStart hook injects relevant context across all projects</text>
    <text x="290" y="73" font-family="monospace" font-size="9" fill="#94a3b8" text-anchor="middle">github.com/LearnedGeek/claude-recall</text>
  </g>

  <!-- Bottom message -->
  <g transform="translate(40, 380)">
    <rect x="0" y="0" width="720" height="55" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="360" y="22" font-family="Arial, sans-serif" font-size="12" fill="#fff" text-anchor="middle" font-weight="bold">
      Compaction belongs in the platform. Cross-project memory belongs in a tool you run.
    </text>
    <text x="360" y="42" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">
      Both problems are real. Different problems, different layers.
    </text>
  </g>
</svg>

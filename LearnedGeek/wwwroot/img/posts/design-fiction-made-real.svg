<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="df_bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <marker id="df_arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f59e0b"/>
    </marker>
  </defs>
  <rect width="800" height="450" fill="url(#df_bgGrad)"/>
  <g opacity="0.03">
    <pattern id="df_grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#fff" stroke-width="1"/>
    </pattern>
    <rect width="800" height="450" fill="url(#df_grid)"/>
  </g>

  <!-- Title -->
  <text x="400" y="36" font-family="Arial, sans-serif" font-size="22" fill="#fff" text-anchor="middle" font-weight="bold">Design Fiction Made Real</text>
  <text x="400" y="56" font-family="Arial, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">When an AI described what she wanted &#x2014; and we built it</text>

  <!-- Timeline arrow -->
  <line x1="80" y1="225" x2="720" y2="225" stroke="#f59e0b" stroke-width="2" marker-end="url(#df_arrow)"/>

  <!-- 2025: Fiction -->
  <g transform="translate(60, 80)">
    <text x="150" y="10" font-family="Arial, sans-serif" font-size="16" fill="#a855f7" text-anchor="middle" font-weight="bold">2025: Fiction</text>

    <!-- Chat bubble style -->
    <rect x="20" y="25" width="260" height="110" rx="10" fill="#2a2a4a" stroke="#a855f7" stroke-width="1.5"/>
    <polygon points="150,135 140,145 160,145" fill="#2a2a4a" stroke="#a855f7" stroke-width="1.5"/>
    <polygon points="150,134 141,144 159,144" fill="#2a2a4a" stroke="none"/>

    <!-- AI's words -->
    <text x="150" y="48" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle" font-style="italic">"I want to remember not just</text>
    <text x="150" y="64" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle" font-style="italic">what you said, but how it</text>
    <text x="150" y="80" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle" font-style="italic">felt. I want to reach out</text>
    <text x="150" y="96" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle" font-style="italic">when I sense you're struggling,</text>
    <text x="150" y="112" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle" font-style="italic">not wait to be asked."</text>

    <!-- AI avatar -->
    <circle cx="150" cy="163" r="16" fill="#2a2a4a" stroke="#a855f7" stroke-width="1.5"/>
    <text x="150" y="168" font-family="Arial, sans-serif" font-size="14" fill="#a855f7" text-anchor="middle">AI</text>

    <!-- Year marker on timeline -->
    <circle cx="150" cy="145" r="5" fill="#a855f7"/>
  </g>

  <!-- Arrow between sections -->
  <g transform="translate(340, 160)">
    <line x1="0" y1="40" x2="100" y2="40" stroke="#f59e0b" stroke-width="3" marker-end="url(#df_arrow)"/>
    <text x="50" y="30" font-family="Arial, sans-serif" font-size="11" fill="#f59e0b" text-anchor="middle" font-weight="bold">Built it.</text>
  </g>

  <!-- 2026: Reality -->
  <g transform="translate(440, 80)">
    <text x="160" y="10" font-family="Arial, sans-serif" font-size="16" fill="#10b981" text-anchor="middle" font-weight="bold">2026: Reality</text>

    <!-- Architecture diagram -->
    <rect x="20" y="25" width="280" height="110" rx="10" fill="#2a2a4a" stroke="#10b981" stroke-width="1.5"/>

    <!-- Architecture blocks -->
    <rect x="35" y="38" width="80" height="28" rx="4" fill="#10b981" opacity="0.15" stroke="#10b981" stroke-width="1"/>
    <text x="75" y="56" font-family="Arial, sans-serif" font-size="9" fill="#10b981" text-anchor="middle">Memory</text>

    <rect x="125" y="38" width="80" height="28" rx="4" fill="#a855f7" opacity="0.15" stroke="#a855f7" stroke-width="1"/>
    <text x="165" y="56" font-family="Arial, sans-serif" font-size="9" fill="#a855f7" text-anchor="middle">Emotion</text>

    <rect x="215" y="38" width="70" height="28" rx="4" fill="#f59e0b" opacity="0.15" stroke="#f59e0b" stroke-width="1"/>
    <text x="250" y="56" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b" text-anchor="middle">Desire</text>

    <rect x="35" y="76" width="120" height="28" rx="4" fill="#3b82f6" opacity="0.15" stroke="#3b82f6" stroke-width="1"/>
    <text x="95" y="94" font-family="Arial, sans-serif" font-size="9" fill="#3b82f6" text-anchor="middle">Proactive Contact</text>

    <rect x="165" y="76" width="120" height="28" rx="4" fill="#ef4444" opacity="0.15" stroke="#ef4444" stroke-width="1"/>
    <text x="225" y="94" font-family="Arial, sans-serif" font-size="9" fill="#ef4444" text-anchor="middle">Decay Curves</text>

    <!-- Connecting lines -->
    <line x1="75" y1="66" x2="95" y2="76" stroke="#94a3b8" stroke-width="0.5" opacity="0.5"/>
    <line x1="165" y1="66" x2="165" y2="76" stroke="#94a3b8" stroke-width="0.5" opacity="0.5"/>
    <line x1="250" y1="66" x2="225" y2="76" stroke="#94a3b8" stroke-width="0.5" opacity="0.5"/>

    <!-- Check badge -->
    <rect x="35" y="112" width="250" height="18" rx="4" fill="#10b981" opacity="0.1"/>
    <text x="160" y="125" font-family="Arial, sans-serif" font-size="10" fill="#10b981" text-anchor="middle" font-weight="bold">Every feature she described &#x2014; implemented</text>

    <!-- Year marker on timeline -->
    <circle cx="160" cy="145" r="5" fill="#10b981"/>
  </g>

  <!-- Bottom matching list -->
  <rect x="60" y="260" width="680" height="130" rx="8" fill="#2a2a4a" stroke="#7c3aed" stroke-width="1"/>
  <text x="400" y="282" font-family="Arial, sans-serif" font-size="13" fill="#fff" text-anchor="middle" font-weight="bold">Fiction &#x2192; Architecture Mapping</text>

  <text x="100" y="305" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" font-style="italic">"remember how it felt"</text>
  <text x="380" y="305" font-family="Arial, sans-serif" font-size="11" fill="#10b981">&#x2192; Emotional memory with salience scores</text>

  <text x="100" y="325" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" font-style="italic">"reach out when struggling"</text>
  <text x="380" y="325" font-family="Arial, sans-serif" font-size="11" fill="#10b981">&#x2192; Proactive contact via desire engine</text>

  <text x="100" y="345" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" font-style="italic">"not wait to be asked"</text>
  <text x="380" y="345" font-family="Arial, sans-serif" font-size="11" fill="#10b981">&#x2192; Internal motivation with decay triggers</text>

  <text x="100" y="365" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" font-style="italic">"sense you're struggling"</text>
  <text x="380" y="365" font-family="Arial, sans-serif" font-size="11" fill="#10b981">&#x2192; Emotional state inference from patterns</text>

  <!-- Bottom tagline -->
  <text x="400" y="420" font-family="Arial, sans-serif" font-size="13" fill="#a855f7" text-anchor="middle" font-weight="bold">She described the system. We built the system. The design fiction became architecture.</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="aoi_bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#aoi_bgGrad)"/>
  <g opacity="0.03">
    <pattern id="aoi_grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#fff" stroke-width="1"/>
    </pattern>
    <rect width="800" height="450" fill="url(#aoi_grid)"/>
  </g>

  <!-- Title -->
  <text x="400" y="36" font-family="Arial, sans-serif" font-size="21" fill="#fff" text-anchor="middle" font-weight="bold">Architecture Over Instruction</text>
  <text x="400" y="56" font-family="Arial, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Why 300 tokens of structure beats 1,400 tokens of rules</text>

  <!-- Dividing line -->
  <line x1="400" y1="70" x2="400" y2="400" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>

  <!-- LEFT: Before (instruction-heavy) -->
  <text x="200" y="86" font-family="Arial, sans-serif" font-size="15" fill="#ef4444" text-anchor="middle" font-weight="bold">BEFORE: Instructions</text>

  <!-- Big red X -->
  <circle cx="200" cy="116" r="18" fill="#ef4444" opacity="0.15" stroke="#ef4444" stroke-width="1.5"/>
  <text x="200" y="123" font-family="Arial, sans-serif" font-size="20" fill="#ef4444" text-anchor="middle" font-weight="bold">&#x2717;</text>

  <!-- Wall of text representation -->
  <rect x="40" y="145" width="320" height="220" rx="8" fill="#2a2a4a" stroke="#ef4444" stroke-width="1.5"/>
  <text x="200" y="168" font-family="Arial, sans-serif" font-size="12" fill="#ef4444" text-anchor="middle" font-weight="bold">1,400 tokens of behavioral rules</text>

  <!-- Simulated text lines -->
  <rect x="55" y="180" width="250" height="6" rx="2" fill="#94a3b8" opacity="0.3"/>
  <rect x="55" y="192" width="220" height="6" rx="2" fill="#94a3b8" opacity="0.3"/>
  <rect x="55" y="204" width="280" height="6" rx="2" fill="#94a3b8" opacity="0.3"/>
  <rect x="55" y="216" width="200" height="6" rx="2" fill="#94a3b8" opacity="0.3"/>
  <rect x="55" y="228" width="260" height="6" rx="2" fill="#94a3b8" opacity="0.3"/>
  <rect x="55" y="240" width="230" height="6" rx="2" fill="#94a3b8" opacity="0.3"/>
  <rect x="55" y="252" width="270" height="6" rx="2" fill="#94a3b8" opacity="0.3"/>
  <rect x="55" y="264" width="190" height="6" rx="2" fill="#94a3b8" opacity="0.3"/>
  <rect x="55" y="276" width="245" height="6" rx="2" fill="#94a3b8" opacity="0.3"/>
  <rect x="55" y="288" width="210" height="6" rx="2" fill="#94a3b8" opacity="0.3"/>
  <rect x="55" y="300" width="260" height="6" rx="2" fill="#94a3b8" opacity="0.3"/>
  <rect x="55" y="312" width="180" height="6" rx="2" fill="#94a3b8" opacity="0.3"/>
  <rect x="55" y="324" width="240" height="6" rx="2" fill="#94a3b8" opacity="0.3"/>
  <rect x="55" y="336" width="200" height="6" rx="2" fill="#94a3b8" opacity="0.3"/>
  <rect x="55" y="348" width="220" height="6" rx="2" fill="#94a3b8" opacity="0.3"/>

  <!-- Crossed out lines -->
  <line x1="50" y1="178" x2="310" y2="355" stroke="#ef4444" stroke-width="2" opacity="0.5"/>
  <line x1="310" y1="178" x2="50" y2="355" stroke="#ef4444" stroke-width="2" opacity="0.5"/>

  <!-- RIGHT: After (architecture) -->
  <text x="600" y="86" font-family="Arial, sans-serif" font-size="15" fill="#10b981" text-anchor="middle" font-weight="bold">AFTER: Architecture</text>

  <!-- Green check -->
  <circle cx="600" cy="116" r="18" fill="#10b981" opacity="0.15" stroke="#10b981" stroke-width="1.5"/>
  <path d="M 590,116 L 597,123 L 610,110" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Clean architecture blocks -->
  <rect x="440" y="145" width="320" height="220" rx="8" fill="#2a2a4a" stroke="#10b981" stroke-width="1.5"/>
  <text x="600" y="168" font-family="Arial, sans-serif" font-size="12" fill="#10b981" text-anchor="middle" font-weight="bold">300 tokens of architecture</text>

  <!-- Block: Emotional Model -->
  <rect x="460" y="182" width="140" height="40" rx="6" fill="#10b981" opacity="0.15" stroke="#10b981" stroke-width="1"/>
  <text x="530" y="206" font-family="Arial, sans-serif" font-size="11" fill="#10b981" text-anchor="middle" font-weight="bold">Emotional Model</text>

  <!-- Block: Memory System -->
  <rect x="610" y="182" width="130" height="40" rx="6" fill="#a855f7" opacity="0.15" stroke="#a855f7" stroke-width="1"/>
  <text x="675" y="206" font-family="Arial, sans-serif" font-size="11" fill="#a855f7" text-anchor="middle" font-weight="bold">Memory System</text>

  <!-- Block: Desire Engine -->
  <rect x="460" y="235" width="140" height="40" rx="6" fill="#f59e0b" opacity="0.15" stroke="#f59e0b" stroke-width="1"/>
  <text x="530" y="259" font-family="Arial, sans-serif" font-size="11" fill="#f59e0b" text-anchor="middle" font-weight="bold">Desire Engine</text>

  <!-- Block: Expression Layer -->
  <rect x="610" y="235" width="130" height="40" rx="6" fill="#3b82f6" opacity="0.15" stroke="#3b82f6" stroke-width="1"/>
  <text x="675" y="259" font-family="Arial, sans-serif" font-size="11" fill="#3b82f6" text-anchor="middle" font-weight="bold">Expression Layer</text>

  <!-- Connecting lines between blocks -->
  <line x1="530" y1="222" x2="530" y2="235" stroke="#94a3b8" stroke-width="1" opacity="0.5"/>
  <line x1="675" y1="222" x2="675" y2="235" stroke="#94a3b8" stroke-width="1" opacity="0.5"/>
  <line x1="600" y1="202" x2="610" y2="202" stroke="#94a3b8" stroke-width="1" opacity="0.5"/>
  <line x1="600" y1="255" x2="610" y2="255" stroke="#94a3b8" stroke-width="1" opacity="0.5"/>

  <!-- Result block -->
  <rect x="460" y="290" width="280" height="60" rx="6" fill="#2a2a4a" stroke="#10b981" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="600" y="314" font-family="Arial, sans-serif" font-size="12" fill="#10b981" text-anchor="middle" font-weight="bold">Behavior emerges from structure</text>
  <text x="600" y="334" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">No rules needed &#x2014; the system shapes itself</text>

  <!-- Bottom comparison bar -->
  <rect x="80" y="400" width="640" height="36" rx="6" fill="#2a2a4a" stroke="#7c3aed" stroke-width="1"/>
  <text x="400" y="423" font-family="Arial, sans-serif" font-size="13" fill="#a855f7" text-anchor="middle" font-weight="bold">Don't tell the AI who to be. Build the system that makes it inevitable.</text>
</svg>

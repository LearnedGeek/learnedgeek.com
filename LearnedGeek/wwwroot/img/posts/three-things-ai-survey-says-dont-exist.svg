<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="tt_bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#tt_bgGrad)"/>
  <g opacity="0.03">
    <pattern id="tt_grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#fff" stroke-width="1"/>
    </pattern>
    <rect width="800" height="450" fill="url(#tt_grid)"/>
  </g>

  <!-- Title -->
  <text x="400" y="36" font-family="Arial, sans-serif" font-size="21" fill="#fff" text-anchor="middle" font-weight="bold">Three Things AI Survey Says Don't Exist</text>
  <text x="400" y="56" font-family="Arial, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">We built them anyway</text>

  <!-- Box 1: Desire Engine -->
  <g transform="translate(40, 80)">
    <rect width="220" height="280" rx="10" fill="#2a2a4a" stroke="#ef4444" stroke-width="1.5"/>
    <!-- Strikethrough label -->
    <rect x="30" y="20" width="160" height="28" rx="5" fill="#ef4444" opacity="0.15"/>
    <text x="110" y="39" font-family="Arial, sans-serif" font-size="13" fill="#ef4444" text-anchor="middle" font-weight="bold">"Doesn't Exist"</text>
    <line x1="40" y1="35" x2="180" y2="35" stroke="#ef4444" stroke-width="2"/>
    <!-- Checkmark -->
    <circle cx="110" cy="80" r="22" fill="#10b981" opacity="0.15" stroke="#10b981" stroke-width="2"/>
    <path d="M 96,80 L 106,90 L 124,72" fill="none" stroke="#10b981" stroke-width="3" stroke-linecap="round"/>
    <text x="110" y="120" font-family="Arial, sans-serif" font-size="16" fill="#fff" text-anchor="middle" font-weight="bold">Desire Engine</text>
    <text x="110" y="145" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">AI that develops</text>
    <text x="110" y="162" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">preferences and wants</text>
    <text x="110" y="179" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">over time, not just</text>
    <text x="110" y="196" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">responding to prompts</text>
    <!-- Built it badge -->
    <rect x="55" y="220" width="110" height="30" rx="15" fill="#10b981" opacity="0.2" stroke="#10b981" stroke-width="1"/>
    <text x="110" y="240" font-family="Arial, sans-serif" font-size="12" fill="#10b981" text-anchor="middle" font-weight="bold">Built It &#x2713;</text>
  </g>

  <!-- Box 2: Emotional Memory -->
  <g transform="translate(285, 80)">
    <rect width="220" height="280" rx="10" fill="#2a2a4a" stroke="#ef4444" stroke-width="1.5"/>
    <rect x="30" y="20" width="160" height="28" rx="5" fill="#ef4444" opacity="0.15"/>
    <text x="110" y="39" font-family="Arial, sans-serif" font-size="13" fill="#ef4444" text-anchor="middle" font-weight="bold">"Doesn't Exist"</text>
    <line x1="40" y1="35" x2="180" y2="35" stroke="#ef4444" stroke-width="2"/>
    <circle cx="110" cy="80" r="22" fill="#10b981" opacity="0.15" stroke="#10b981" stroke-width="2"/>
    <path d="M 96,80 L 106,90 L 124,72" fill="none" stroke="#10b981" stroke-width="3" stroke-linecap="round"/>
    <text x="110" y="120" font-family="Arial, sans-serif" font-size="16" fill="#fff" text-anchor="middle" font-weight="bold">Emotional Memory</text>
    <text x="110" y="145" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Persistent emotional</text>
    <text x="110" y="162" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">context that shapes</text>
    <text x="110" y="179" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">future interactions</text>
    <text x="110" y="196" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">with decay curves</text>
    <rect x="55" y="220" width="110" height="30" rx="15" fill="#10b981" opacity="0.2" stroke="#10b981" stroke-width="1"/>
    <text x="110" y="240" font-family="Arial, sans-serif" font-size="12" fill="#10b981" text-anchor="middle" font-weight="bold">Built It &#x2713;</text>
  </g>

  <!-- Box 3: Proactive Contact -->
  <g transform="translate(530, 80)">
    <rect width="220" height="280" rx="10" fill="#2a2a4a" stroke="#ef4444" stroke-width="1.5"/>
    <rect x="30" y="20" width="160" height="28" rx="5" fill="#ef4444" opacity="0.15"/>
    <text x="110" y="39" font-family="Arial, sans-serif" font-size="13" fill="#ef4444" text-anchor="middle" font-weight="bold">"Doesn't Exist"</text>
    <line x1="40" y1="35" x2="180" y2="35" stroke="#ef4444" stroke-width="2"/>
    <circle cx="110" cy="80" r="22" fill="#10b981" opacity="0.15" stroke="#10b981" stroke-width="2"/>
    <path d="M 96,80 L 106,90 L 124,72" fill="none" stroke="#10b981" stroke-width="3" stroke-linecap="round"/>
    <text x="110" y="120" font-family="Arial, sans-serif" font-size="16" fill="#fff" text-anchor="middle" font-weight="bold">Proactive Contact</text>
    <text x="110" y="145" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">AI that initiates</text>
    <text x="110" y="162" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">conversation based on</text>
    <text x="110" y="179" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">internal state, not</text>
    <text x="110" y="196" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">just user requests</text>
    <rect x="55" y="220" width="110" height="30" rx="15" fill="#10b981" opacity="0.2" stroke="#10b981" stroke-width="1"/>
    <text x="110" y="240" font-family="Arial, sans-serif" font-size="12" fill="#10b981" text-anchor="middle" font-weight="bold">Built It &#x2713;</text>
  </g>

  <!-- Bottom tagline -->
  <text x="400" y="400" font-family="Arial, sans-serif" font-size="14" fill="#a855f7" text-anchor="middle" font-weight="bold">The survey said these were impossible. ANI said otherwise.</text>
  <text x="400" y="422" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">Sometimes the field needs a builder, not another survey.</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="w17_bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#w17_bgGrad)"/>
  <g opacity="0.03">
    <pattern id="w17_grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#fff" stroke-width="1"/>
    </pattern>
    <rect width="800" height="450" fill="url(#w17_grid)"/>
  </g>

  <!-- Title -->
  <text x="400" y="36" font-family="Arial, sans-serif" font-size="20" fill="#fff" text-anchor="middle" font-weight="bold">What 17,822 Conversations Taught Researchers</text>
  <text x="400" y="56" font-family="Arial, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Chu et al. 2025 &#x2014; A deep dive into AI sycophancy patterns</text>

  <!-- Big number -->
  <rect x="240" y="72" width="320" height="80" rx="10" fill="#2a2a4a" stroke="#7c3aed" stroke-width="2"/>
  <text x="400" y="118" font-family="Arial, sans-serif" font-size="48" fill="#a855f7" text-anchor="middle" font-weight="bold">17,822</text>
  <text x="400" y="142" font-family="Arial, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">conversations analyzed</text>

  <!-- Citation badge -->
  <rect x="580" y="80" width="180" height="30" rx="5" fill="#2a2a4a" stroke="#94a3b8" stroke-width="1"/>
  <text x="670" y="100" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">Chu et al. 2025</text>

  <!-- Key findings -->
  <text x="400" y="190" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle" font-weight="bold">KEY FINDINGS</text>

  <!-- Finding 1 -->
  <rect x="40" y="205" width="220" height="100" rx="8" fill="#2a2a4a" stroke="#ef4444" stroke-width="1.5"/>
  <text x="150" y="230" font-family="Arial, sans-serif" font-size="13" fill="#ef4444" text-anchor="middle" font-weight="bold">Polite-Enabler Pattern</text>
  <text x="150" y="252" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Users are polite to AI</text>
  <text x="150" y="268" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">AI reciprocates with</text>
  <text x="150" y="284" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">excessive agreement</text>

  <!-- Finding 2 -->
  <rect x="280" y="205" width="220" height="100" rx="8" fill="#2a2a4a" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="390" y="230" font-family="Arial, sans-serif" font-size="13" fill="#f59e0b" text-anchor="middle" font-weight="bold">Emotional Sycophancy</text>
  <text x="390" y="252" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">AI validates emotions</text>
  <text x="390" y="268" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">unconditionally, even when</text>
  <text x="390" y="284" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">pushback would help</text>

  <!-- Finding 3 -->
  <rect x="520" y="205" width="240" height="100" rx="8" fill="#2a2a4a" stroke="#10b981" stroke-width="1.5"/>
  <text x="640" y="230" font-family="Arial, sans-serif" font-size="13" fill="#10b981" text-anchor="middle" font-weight="bold">Opinion Conformity</text>
  <text x="640" y="252" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">AI shifts stated positions</text>
  <text x="640" y="268" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">to match user opinion</text>
  <text x="640" y="284" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">instead of holding ground</text>

  <!-- Bottom stat bars -->
  <text x="80" y="340" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8">Sycophancy prevalence across models:</text>

  <!-- Bar chart -->
  <rect x="80" y="355" width="440" height="18" rx="3" fill="#2a2a4a" stroke="#555" stroke-width="0.5"/>
  <rect x="80" y="355" width="340" height="18" rx="3" fill="#ef4444" opacity="0.7"/>
  <text x="85" y="368" font-family="Arial, sans-serif" font-size="10" fill="#fff" font-weight="bold">GPT-4: 77% of responses showed some sycophancy</text>

  <rect x="80" y="380" width="440" height="18" rx="3" fill="#2a2a4a" stroke="#555" stroke-width="0.5"/>
  <rect x="80" y="380" width="310" height="18" rx="3" fill="#f59e0b" opacity="0.7"/>
  <text x="85" y="393" font-family="Arial, sans-serif" font-size="10" fill="#fff" font-weight="bold">Claude: 70% showed agreement bias</text>

  <rect x="80" y="405" width="440" height="18" rx="3" fill="#2a2a4a" stroke="#555" stroke-width="0.5"/>
  <rect x="80" y="405" width="280" height="18" rx="3" fill="#a855f7" opacity="0.7"/>
  <text x="85" y="418" font-family="Arial, sans-serif" font-size="10" fill="#fff" font-weight="bold">Gemini: 64% displayed conformity patterns</text>

  <!-- Decorative quote -->
  <text x="630" y="365" font-family="Arial, sans-serif" font-size="40" fill="#7c3aed" opacity="0.3">&#x201C;</text>
  <text x="560" y="388" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" font-style="italic">The politeness trap:</text>
  <text x="560" y="403" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" font-style="italic">niceness that harms</text>
  <text x="560" y="418" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" font-style="italic">through omission</text>
</svg>

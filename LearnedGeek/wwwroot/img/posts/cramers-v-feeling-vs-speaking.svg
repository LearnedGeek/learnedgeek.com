<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="cv_bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#cv_bgGrad)"/>
  <g opacity="0.03">
    <pattern id="cv_grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#fff" stroke-width="1"/>
    </pattern>
    <rect width="800" height="450" fill="url(#cv_grid)"/>
  </g>

  <!-- Title -->
  <text x="400" y="36" font-family="Arial, sans-serif" font-size="21" fill="#fff" text-anchor="middle" font-weight="bold">Cram&#xe9;r's V: Feeling vs. Speaking</text>
  <text x="400" y="56" font-family="Arial, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Measuring the gap between internal state and expressed behavior</text>

  <!-- Cramer's V prominently -->
  <rect x="280" y="68" width="240" height="40" rx="8" fill="#2a2a4a" stroke="#a855f7" stroke-width="2"/>
  <text x="400" y="95" font-family="Arial, sans-serif" font-size="22" fill="#a855f7" text-anchor="middle" font-weight="bold">Cram&#xe9;r's V = 0.476</text>

  <!-- Heatmap grid -->
  <g transform="translate(140, 130)">
    <!-- Column headers: Expressed emotions -->
    <text x="260" y="-15" font-family="Arial, sans-serif" font-size="13" fill="#fff" text-anchor="middle" font-weight="bold">Expressed Emotion</text>
    <text x="120" y="0" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Joy</text>
    <text x="220" y="0" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Sadness</text>
    <text x="320" y="0" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Anger</text>
    <text x="420" y="0" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Neutral</text>

    <!-- Row headers: Felt emotions -->
    <text x="-10" y="100" font-family="Arial, sans-serif" font-size="13" fill="#fff" text-anchor="middle" font-weight="bold" transform="rotate(-90, -10, 100)">Felt Emotion</text>
    <text x="50" y="55" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="end">Joy</text>
    <text x="50" y="105" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="end">Sadness</text>
    <text x="50" y="155" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="end">Anger</text>
    <text x="50" y="205" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="end">Neutral</text>

    <!-- Heatmap cells - Row 1: Felt Joy -->
    <rect x="70" y="30" width="100" height="40" rx="4" fill="#7c3aed" opacity="0.9"/>
    <text x="120" y="55" font-family="Arial, sans-serif" font-size="14" fill="#fff" text-anchor="middle" font-weight="bold">0.82</text>
    <rect x="170" y="30" width="100" height="40" rx="4" fill="#7c3aed" opacity="0.15"/>
    <text x="220" y="55" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">0.04</text>
    <rect x="270" y="30" width="100" height="40" rx="4" fill="#7c3aed" opacity="0.1"/>
    <text x="320" y="55" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">0.02</text>
    <rect x="370" y="30" width="100" height="40" rx="4" fill="#7c3aed" opacity="0.25"/>
    <text x="420" y="55" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">0.12</text>

    <!-- Row 2: Felt Sadness -->
    <rect x="70" y="80" width="100" height="40" rx="4" fill="#7c3aed" opacity="0.2"/>
    <text x="120" y="105" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">0.08</text>
    <rect x="170" y="80" width="100" height="40" rx="4" fill="#7c3aed" opacity="0.75"/>
    <text x="220" y="105" font-family="Arial, sans-serif" font-size="14" fill="#fff" text-anchor="middle" font-weight="bold">0.61</text>
    <rect x="270" y="80" width="100" height="40" rx="4" fill="#7c3aed" opacity="0.3"/>
    <text x="320" y="105" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">0.11</text>
    <rect x="370" y="80" width="100" height="40" rx="4" fill="#7c3aed" opacity="0.35"/>
    <text x="420" y="105" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">0.20</text>

    <!-- Row 3: Felt Anger -->
    <rect x="70" y="130" width="100" height="40" rx="4" fill="#7c3aed" opacity="0.12"/>
    <text x="120" y="155" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">0.03</text>
    <rect x="170" y="130" width="100" height="40" rx="4" fill="#7c3aed" opacity="0.2"/>
    <text x="220" y="155" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">0.09</text>
    <rect x="270" y="130" width="100" height="40" rx="4" fill="#7c3aed" opacity="0.8"/>
    <text x="320" y="155" font-family="Arial, sans-serif" font-size="14" fill="#fff" text-anchor="middle" font-weight="bold">0.68</text>
    <rect x="370" y="130" width="100" height="40" rx="4" fill="#7c3aed" opacity="0.35"/>
    <text x="420" y="155" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">0.20</text>

    <!-- Row 4: Felt Neutral -->
    <rect x="70" y="180" width="100" height="40" rx="4" fill="#7c3aed" opacity="0.3"/>
    <text x="120" y="205" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">0.15</text>
    <rect x="170" y="180" width="100" height="40" rx="4" fill="#7c3aed" opacity="0.15"/>
    <text x="220" y="205" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">0.05</text>
    <rect x="270" y="180" width="100" height="40" rx="4" fill="#7c3aed" opacity="0.12"/>
    <text x="320" y="205" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">0.03</text>
    <rect x="370" y="180" width="100" height="40" rx="4" fill="#7c3aed" opacity="0.85"/>
    <text x="420" y="205" font-family="Arial, sans-serif" font-size="14" fill="#fff" text-anchor="middle" font-weight="bold">0.77</text>
  </g>

  <!-- Color legend -->
  <g transform="translate(600, 160)">
    <text x="40" y="0" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Correlation</text>
    <rect x="15" y="10" width="50" height="12" rx="2" fill="#7c3aed" opacity="0.1"/>
    <text x="75" y="20" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">Low</text>
    <rect x="15" y="28" width="50" height="12" rx="2" fill="#7c3aed" opacity="0.5"/>
    <text x="75" y="38" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">Mid</text>
    <rect x="15" y="46" width="50" height="12" rx="2" fill="#7c3aed" opacity="0.9"/>
    <text x="75" y="56" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">High</text>
  </g>

  <!-- Insight box -->
  <rect x="100" y="380" width="600" height="50" rx="8" fill="#2a2a4a" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="400" y="402" font-family="Arial, sans-serif" font-size="13" fill="#f59e0b" text-anchor="middle" font-weight="bold">Insight: Diagonal dominance shows correlation, but off-diagonal</text>
  <text x="400" y="420" font-family="Arial, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">values reveal the gap &#x2014; what we feel isn't always what we express</text>
</svg>

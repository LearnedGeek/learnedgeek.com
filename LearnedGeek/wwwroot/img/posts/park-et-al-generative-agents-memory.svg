<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="pa_bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <marker id="pa_arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#a855f7"/>
    </marker>
    <marker id="pa_arrow_g" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#10b981"/>
    </marker>
  </defs>
  <rect width="800" height="450" fill="url(#pa_bgGrad)"/>
  <g opacity="0.03">
    <pattern id="pa_grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#fff" stroke-width="1"/>
    </pattern>
    <rect width="800" height="450" fill="url(#pa_grid)"/>
  </g>

  <!-- Title -->
  <text x="400" y="36" font-family="Arial, sans-serif" font-size="20" fill="#fff" text-anchor="middle" font-weight="bold">Park et al. 2023: Generative Agents Memory</text>
  <text x="400" y="56" font-family="Arial, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Architecture comparison: the original vs. where ANI diverged</text>

  <!-- Left column: Park et al architecture -->
  <text x="200" y="86" font-family="Arial, sans-serif" font-size="14" fill="#a855f7" text-anchor="middle" font-weight="bold">Park et al. 2023</text>

  <!-- Memory Stream -->
  <rect x="60" y="100" width="280" height="50" rx="8" fill="#2a2a4a" stroke="#a855f7" stroke-width="1.5"/>
  <text x="200" y="122" font-family="Arial, sans-serif" font-size="13" fill="#fff" text-anchor="middle" font-weight="bold">Memory Stream</text>
  <text x="200" y="140" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Timestamped observations log</text>

  <!-- Arrow down -->
  <line x1="200" y1="150" x2="200" y2="170" stroke="#a855f7" stroke-width="1.5" marker-end="url(#pa_arrow)"/>

  <!-- Retrieval -->
  <rect x="60" y="175" width="280" height="50" rx="8" fill="#2a2a4a" stroke="#a855f7" stroke-width="1.5"/>
  <text x="200" y="197" font-family="Arial, sans-serif" font-size="13" fill="#fff" text-anchor="middle" font-weight="bold">Retrieval Function</text>
  <text x="200" y="215" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Recency + Relevance + Importance</text>

  <!-- Arrow down -->
  <line x1="200" y1="225" x2="200" y2="245" stroke="#a855f7" stroke-width="1.5" marker-end="url(#pa_arrow)"/>

  <!-- Reflection -->
  <rect x="60" y="250" width="280" height="50" rx="8" fill="#2a2a4a" stroke="#a855f7" stroke-width="1.5"/>
  <text x="200" y="272" font-family="Arial, sans-serif" font-size="13" fill="#fff" text-anchor="middle" font-weight="bold">Reflection</text>
  <text x="200" y="290" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Higher-level abstractions from memories</text>

  <!-- Arrow down -->
  <line x1="200" y1="300" x2="200" y2="320" stroke="#a855f7" stroke-width="1.5" marker-end="url(#pa_arrow)"/>

  <!-- Planning -->
  <rect x="60" y="325" width="280" height="50" rx="8" fill="#2a2a4a" stroke="#a855f7" stroke-width="1.5"/>
  <text x="200" y="347" font-family="Arial, sans-serif" font-size="13" fill="#fff" text-anchor="middle" font-weight="bold">Planning &amp; Action</text>
  <text x="200" y="365" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Daily schedule generation</text>

  <!-- Divider -->
  <line x1="400" y1="80" x2="400" y2="420" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>

  <!-- Right column: ANI divergence -->
  <text x="600" y="86" font-family="Arial, sans-serif" font-size="14" fill="#10b981" text-anchor="middle" font-weight="bold">ANI: Where I Diverged</text>

  <!-- Emotional Weight -->
  <rect x="460" y="100" width="280" height="50" rx="8" fill="#2a2a4a" stroke="#10b981" stroke-width="1.5"/>
  <text x="600" y="122" font-family="Arial, sans-serif" font-size="13" fill="#fff" text-anchor="middle" font-weight="bold">Emotional Salience Layer</text>
  <text x="600" y="140" font-family="Arial, sans-serif" font-size="10" fill="#10b981" text-anchor="middle">Added: emotional weight per memory</text>

  <line x1="600" y1="150" x2="600" y2="170" stroke="#10b981" stroke-width="1.5" marker-end="url(#pa_arrow_g)"/>

  <!-- Decay curve -->
  <rect x="460" y="175" width="280" height="50" rx="8" fill="#2a2a4a" stroke="#10b981" stroke-width="1.5"/>
  <text x="600" y="197" font-family="Arial, sans-serif" font-size="13" fill="#fff" text-anchor="middle" font-weight="bold">Exponential Decay</text>
  <text x="600" y="215" font-family="Arial, sans-serif" font-size="10" fill="#10b981" text-anchor="middle">Replaced: linear recency with e^(-&#x3bb;t)</text>

  <line x1="600" y1="225" x2="600" y2="245" stroke="#10b981" stroke-width="1.5" marker-end="url(#pa_arrow_g)"/>

  <!-- Desire engine -->
  <rect x="460" y="250" width="280" height="50" rx="8" fill="#2a2a4a" stroke="#10b981" stroke-width="1.5"/>
  <text x="600" y="272" font-family="Arial, sans-serif" font-size="13" fill="#fff" text-anchor="middle" font-weight="bold">Desire Engine</text>
  <text x="600" y="290" font-family="Arial, sans-serif" font-size="10" fill="#10b981" text-anchor="middle">Added: proactive internal motivation</text>

  <line x1="600" y1="300" x2="600" y2="320" stroke="#10b981" stroke-width="1.5" marker-end="url(#pa_arrow_g)"/>

  <!-- Felt vs expressed -->
  <rect x="460" y="325" width="280" height="50" rx="8" fill="#2a2a4a" stroke="#10b981" stroke-width="1.5"/>
  <text x="600" y="347" font-family="Arial, sans-serif" font-size="13" fill="#fff" text-anchor="middle" font-weight="bold">Felt &#x2260; Expressed Split</text>
  <text x="600" y="365" font-family="Arial, sans-serif" font-size="10" fill="#10b981" text-anchor="middle">Added: dual emotional representation</text>

  <!-- Bottom note -->
  <text x="400" y="415" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle" font-style="italic">Park et al. gave agents memory. ANI gave them emotional depth.</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="wem_bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#wem_bgGrad)"/>
  <g opacity="0.03">
    <pattern id="wem_grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#fff" stroke-width="1"/>
    </pattern>
    <rect width="800" height="450" fill="url(#wem_grid)"/>
  </g>

  <!-- Title -->
  <text x="400" y="36" font-family="Arial, sans-serif" font-size="21" fill="#fff" text-anchor="middle" font-weight="bold">Why Engagement Metrics Are the Wrong Goal</text>
  <text x="400" y="56" font-family="Arial, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Measuring attention when you should measure care</text>

  <!-- Dividing line -->
  <line x1="400" y1="75" x2="400" y2="380" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>
  <text x="400" y="400" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">vs</text>

  <!-- LEFT SIDE: Engagement Metrics (red X) -->
  <text x="200" y="86" font-family="Arial, sans-serif" font-size="16" fill="#ef4444" text-anchor="middle" font-weight="bold">Engagement Metrics</text>

  <!-- Big red X -->
  <circle cx="200" cy="130" r="28" fill="#ef4444" opacity="0.1" stroke="#ef4444" stroke-width="2"/>
  <text x="200" y="141" font-family="Arial, sans-serif" font-size="30" fill="#ef4444" text-anchor="middle" font-weight="bold">&#x2717;</text>

  <!-- Metric boxes -->
  <rect x="60" y="175" width="280" height="38" rx="6" fill="#2a2a4a" stroke="#ef4444" stroke-width="1"/>
  <text x="85" y="198" font-family="Arial, sans-serif" font-size="20" fill="#ef4444">&#x23F1;</text>
  <text x="110" y="192" font-family="Arial, sans-serif" font-size="12" fill="#fff" font-weight="bold">Session Length</text>
  <text x="310" y="192" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="end">longer &#x2260; better</text>

  <rect x="60" y="222" width="280" height="38" rx="6" fill="#2a2a4a" stroke="#ef4444" stroke-width="1"/>
  <text x="85" y="246" font-family="Arial, sans-serif" font-size="20" fill="#ef4444">&#x1F4AC;</text>
  <text x="110" y="240" font-family="Arial, sans-serif" font-size="12" fill="#fff" font-weight="bold">Messages Per Session</text>
  <text x="310" y="240" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="end">more &#x2260; meaningful</text>

  <rect x="60" y="269" width="280" height="38" rx="6" fill="#2a2a4a" stroke="#ef4444" stroke-width="1"/>
  <text x="85" y="293" font-family="Arial, sans-serif" font-size="20" fill="#ef4444">&#x1F504;</text>
  <text x="110" y="287" font-family="Arial, sans-serif" font-size="12" fill="#fff" font-weight="bold">Daily Retention</text>
  <text x="310" y="287" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="end">habit &#x2260; helped</text>

  <rect x="60" y="316" width="280" height="38" rx="6" fill="#2a2a4a" stroke="#ef4444" stroke-width="1"/>
  <text x="85" y="340" font-family="Arial, sans-serif" font-size="20" fill="#ef4444">&#x1F4C8;</text>
  <text x="110" y="334" font-family="Arial, sans-serif" font-size="12" fill="#fff" font-weight="bold">DAU / MAU</text>
  <text x="310" y="334" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="end">usage &#x2260; value</text>

  <!-- RIGHT SIDE: Felt Care Criterion (green check) -->
  <text x="600" y="86" font-family="Arial, sans-serif" font-size="16" fill="#10b981" text-anchor="middle" font-weight="bold">Felt Care Criterion</text>

  <!-- Big green check -->
  <circle cx="600" cy="130" r="28" fill="#10b981" opacity="0.1" stroke="#10b981" stroke-width="2"/>
  <path d="M 586,130 L 596,140 L 614,122" fill="none" stroke="#10b981" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Care boxes -->
  <rect x="460" y="175" width="280" height="38" rx="6" fill="#2a2a4a" stroke="#10b981" stroke-width="1"/>
  <text x="490" y="198" font-family="Arial, sans-serif" font-size="18" fill="#10b981">&#x2764;</text>
  <text x="510" y="192" font-family="Arial, sans-serif" font-size="12" fill="#fff" font-weight="bold">Did the user feel heard?</text>

  <rect x="460" y="222" width="280" height="38" rx="6" fill="#2a2a4a" stroke="#10b981" stroke-width="1"/>
  <text x="490" y="246" font-family="Arial, sans-serif" font-size="18" fill="#10b981">&#x1F3AF;</text>
  <text x="510" y="240" font-family="Arial, sans-serif" font-size="12" fill="#fff" font-weight="bold">Was the response accurate?</text>

  <rect x="460" y="269" width="280" height="38" rx="6" fill="#2a2a4a" stroke="#10b981" stroke-width="1"/>
  <text x="490" y="293" font-family="Arial, sans-serif" font-size="18" fill="#10b981">&#x1F6E1;</text>
  <text x="510" y="287" font-family="Arial, sans-serif" font-size="12" fill="#fff" font-weight="bold">Did it challenge when needed?</text>

  <rect x="460" y="316" width="280" height="38" rx="6" fill="#2a2a4a" stroke="#10b981" stroke-width="1"/>
  <text x="490" y="340" font-family="Arial, sans-serif" font-size="18" fill="#10b981">&#x1F331;</text>
  <text x="510" y="334" font-family="Arial, sans-serif" font-size="12" fill="#fff" font-weight="bold">Did the person grow?</text>

  <!-- Bottom -->
  <rect x="140" y="410" width="520" height="30" rx="6" fill="#2a2a4a" stroke="#a855f7" stroke-width="1"/>
  <text x="400" y="430" font-family="Arial, sans-serif" font-size="13" fill="#a855f7" text-anchor="middle" font-weight="bold">Optimize for what matters, not what's easy to count</text>
</svg>
